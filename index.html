<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBP 回報中心</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.lactame.com/lib/image-js/0.31.0/image.min.js"></script>
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-light: #eef2ff;
            --secondary: #06b6d4; 
            --bg: #f8fafc; 
            --sidebar: #ffffff; 
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #f1f5f9;
        }
        
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', "Microsoft JhengHei", sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text-main); overflow: hidden; }
        
        /* 側邊欄優化 */
        nav { 
            width: 260px; 
            background: var(--sidebar); 
            border-right: 1px solid var(--border); 
            display: flex; 
            flex-direction: column; 
            padding: 30px 20px; 
            flex-shrink: 0; 
        }
        .logo { 
            font-weight: 800; 
            font-size: 1.5rem; 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 40px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }
        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { 
            padding: 14px 18px; 
            border-radius: 12px; 
            cursor: pointer; 
            color: var(--text-sub); 
            transition: 0.2s all; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            font-weight: 600; 
            text-decoration: none;
        }
        .nav-item:hover { background: var(--bg); color: var(--primary); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); }
        .admin-footer { margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px; }

        /* 主區域樣式 */
        main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        
        /* 卡片設計 - 去除黑線，使用微陰影 */
        .card { 
            background: white; 
            border-radius: 24px; 
            padding: 30px; 
            border: none; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            margin-bottom: 25px; 
        }
        
        .section-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        /* 輸入框優化 */
        label { font-size: 0.9rem; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; display: block; }
        input, select { 
            width: 100%; 
            padding: 14px; 
            border: 1.5px solid var(--border); 
            border-radius: 14px; 
            font-size: 1rem; 
            background: #fff;
            transition: 0.2s;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-light); }

        /* 編輯器外框樣式現代化 */
        .editor-container-wrapper { border: 1.5px solid var(--border); border-radius: 16px; overflow: hidden; transition: 0.2s; }
        .editor-container-wrapper:focus-within { border-color: var(--primary); }
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1.5px solid var(--border) !important; background: #fcfdfe; padding: 12px !important; }
        .ql-container.ql-snow { border: none !important; min-height: 200px; font-size: 1rem; }

        /* 數據卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { 
            background: white; 
            padding: 25px; 
            border-radius: 24px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 0.85rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 2.2rem; font-weight: 800; margin-top: 12px; display: block; }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px 28px; 
            border-radius: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            justify-content: center;
            font-size: 1rem;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.2); }
        button:active { transform: translateY(0); }

        /* 訊息泡泡與折疊 */
        .bubble { padding: 16px; border-radius: 18px; margin-bottom: 12px; line-height: 1.6; border: 1.5px solid var(--border); }
        .bubble-user { background: var(--bg); border-bottom-left-radius: 4px; }
        .bubble-admin { background: var(--primary-light); border-color: transparent; border-bottom-right-radius: 4px; }

        #toast { position: fixed; bottom: 30px; right: 30px; background: var(--text-main); color: white; padding: 16px 28px; border-radius: 16px; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .view { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-paper-plane"></i> BBP 回報中心</div>
        <div class="nav-group">
            <div class="nav-item active" onclick="showView('dash-view', this)"><i class="fas fa-th-large"></i> 總覽儀表板</div>
            <div class="nav-item" onclick="showView('report-view', this)"><i class="fas fa-plus-circle"></i> 新增案件回報</div>
            <div class="nav-item" onclick="showView('status-view', this)"><i class="fas fa-search"></i> 案件進度查詢</div>
        </div>
        <div class="admin-footer">
            <div class="nav-item" onclick="showView('login-view', this)"><i class="fas fa-user-shield"></i> 管理者後台</div>
        </div>
    </nav>

    <main>
        <div class="container">
            
            <div id="dash-view" class="view active">
                <div class="section-title">營運數據概況</div>
                <div class="stats-grid">
                    <div class="stat-card"><h3>當前負載</h3><span class="value" id="stat-pending">0</span></div>
                    <div class="stat-card"><h3>本週進度</h3><span class="value" id="stat-resolved" style="color: #10b981;">0</span></div>
                    <div class="stat-card"><h3>結案率</h3><span class="value" id="stat-rate" style="color: var(--primary);">0%</span></div>
                </div>
                <div class="section-title">🔥 急件關注</div>
                <div id="priority-list"></div>
            </div>

            <div id="report-view" class="view">
                <div class="section-title">建立新案件</div>
                <div class="card">
                    <form id="reportForm">
                        <label>聯絡 Email</label>
                        <input type="email" id="email" placeholder="請輸入您的信箱" required>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0;">
                            <div><label>案件分類</label><select id="type"><option>BUG 回報</option><option>功能建議</option></select></div>
                            <div><label>案件標題</label><input type="text" id="title" placeholder="簡單標題" required></div>
                        </div>
                        <label>詳細描述</label>
                        <div class="editor-container-wrapper">
                            <div id="editor-user" class="editor-box"></div>
                        </div>
                        <button type="submit" id="submitBtn" style="width:100%; margin-top:25px;"><i class="fas fa-paper-plane"></i> 提交回報案件</button>
                    </form>
                </div>
            </div>

            <div id="status-view" class="view">
                <div class="section-title">案件進度查詢</div>
                <div class="card" style="display:flex; gap:12px; align-items:center;">
                    <input type="email" id="searchEmail" placeholder="輸入回報時的 Email" style="flex:1">
                    <button id="searchBtn" onclick="searchUserTickets()"><i class="fas fa-search"></i> 搜尋</button>
                </div>
                <div id="user-result-list"></div>
            </div>

            <div id="login-view" class="view">
                <div class="card" style="max-width:400px; margin: 80px auto; text-align:center;">
                    <div class="section-title" style="justify-content:center;">管理者驗證</div>
                    <input type="password" id="adminPassword" placeholder="請輸入後台金鑰" style="margin-bottom:20px;">
                    <button onclick="checkAdminLogin()" style="width:100%">進入後台系統</button>
                </div>
            </div>

            <div id="admin-view" class="view">
                <div class="section-title">管理者後台</div>
                <div id="admin-list"></div>
            </div>

        </div>
    </main>

    <div id="toast"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz5i3qIe1lZhsbzw0E6kJF85nef6-xi_cajjwWqS-HqVUYsxE_XA7GjQqOxTm7VVVJbpQ/exec";
        const qlModules = { toolbar: [['bold', 'italic'], [{list:'bullet'}], ['image']] };
        let allData = [];

        var userQuill = new Quill('#editor-user', { theme: 'snow', modules: qlModules });

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id === 'dash-view') fetchData();
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function compressHTML(html) {
            const div = document.createElement('div'); div.innerHTML = html;
            const imgs = div.querySelectorAll('img');
            for (let img of imgs) {
                const src = img.getAttribute('src');
                if (src && src.startsWith('data:image/') && src.length > 5000) {
                    try {
                        const image = await Image.load(src);
                        let resized = image;
                        if (image.width > 500) resized = image.resize({ width: 500 });
                        img.setAttribute('src', resized.toDataURL('image/jpeg', 0.4));
                    } catch (e) { console.warn(e); }
                }
            }
            return div.innerHTML;
        }

        async function fetchData() {
            try {
                const res = await fetch(GAS_URL);
                allData = await res.json();
                renderDashboard();
            } catch (e) { showToast("連線失敗"); }
        }

        function renderDashboard() {
            if (allData.length < 2) return;
            let tickets = {};
            let latestCycle = allData[allData.length-1][10];

            allData.slice(1).forEach(row => {
                const id = row[0];
                if(!tickets[id]) tickets[id] = { id, title:row[4], status:row[7], priority:row[9], cycle:row[10] };
                tickets[id].status = row[7];
                tickets[id].cycle = row[10];
            });

            const ticketList = Object.values(tickets);
            document.getElementById('stat-pending').innerText = ticketList.filter(t => t.status === '待處理').length;
            document.getElementById('stat-resolved').innerText = ticketList.filter(t => t.status === '已解決' && t.cycle === latestCycle).length;
            const totalThisCycle = ticketList.filter(t => t.cycle === latestCycle).length;
            document.getElementById('stat-rate').innerText = totalThisCycle > 0 ? Math.round((ticketList.filter(t => t.status === '已解決' && t.cycle === latestCycle).length / totalThisCycle) * 100) + "%" : "0%";

            const listArea = document.getElementById('priority-list');
            listArea.innerHTML = "";
            ticketList.filter(t => t.status === '待處理').sort((a,b) => String(a.priority).localeCompare(String(b.priority))).slice(0, 5).forEach(t => {
                listArea.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:20px;">
                    <div><b style="color:var(--primary); margin-right:12px;">${t.priority || '2-優先'}</b><b>${t.title}</b></div>
                    <i class="fas fa-chevron-right" style="color:#cbd5e1"></i>
                </div>`;
            });
        }

        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.classList.add('loading');
            try {
                const content = await compressHTML(userQuill.root.innerHTML);
                const data = { email: document.getElementById('email').value.trim(), type: document.getElementById('type').value, title: document.getElementById('title').value.trim(), description: content };
                await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
                showToast("提交成功！");
                userQuill.setContents([]); e.target.reset();
                fetchData(); showView('dash-view', document.getElementById('nav-dash'));
            } catch (e) { showToast("提交失敗"); }
            finally { btn.classList.remove('loading'); }
        };

        async function searchUserTickets() {
            const email = document.getElementById('searchEmail').value.trim().toLowerCase();
            if(!email) return showToast("請輸入 Email");
            const btn = document.getElementById('searchBtn'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            await fetchData();
            btn.innerHTML = '<i class="fas fa-search"></i> 搜尋';

            const area = document.getElementById('user-result-list'); area.innerHTML = "";
            let tickets = {};
            allData.slice(1).forEach(row => {
                if(String(row[2]).toLowerCase().trim() !== email) return;
                const id = row[0];
                if(!tickets[id]) tickets[id] = { title: row[4], status: row[7], msgs: [] };
                tickets[id].msgs.push({ sender: row[6], content: row[5] });
                tickets[id].status = row[7];
            });

            Object.values(tickets).reverse().forEach(t => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <b>${t.title} <small style="margin-left:10px; color:var(--primary)">[${t.status}]</small></b><i class="fas fa-chevron-down"></i></div>
                    <div class="collapsible-content">${t.msgs.map(m=>`<div class="bubble bubble-${m.sender==='管理者'?'admin':'user'}"><b>${m.sender}:</b> <div>${m.content}</div></div>`).join('')}</div>`;
                area.appendChild(card);
            });
        }

        function checkAdminLogin() {
            if(document.getElementById('adminPassword').value === 'admin123') { showView('admin-view'); renderAdmin(); }
            else showToast("密碼錯誤");
        }

        function renderAdmin() {
            const area = document.getElementById('admin-list'); area.innerHTML = "";
            let tickets = {};
            allData.slice(1).forEach(row => {
                const id = row[0];
                if(!tickets[id]) tickets[id] = { id, email:row[2], title:row[4], status:row[7], priority:row[9], msgs: [] };
                tickets[id].msgs.push({ sender: row[6], content: row[5] });
                tickets[id].status = row[7];
                tickets[id].priority = row[9];
            });

            Object.values(tickets).reverse().forEach(t => {
                const card = document.createElement('div'); card.className = "card";
                card.innerHTML = `<div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <b>${t.title} (${t.email})</b> <span style="color:var(--primary); font-weight:800">${t.priority || '2-優先'}</span></div>
                    <div class="collapsible-content">
                        <div style="margin-bottom:20px;">${t.msgs.map(m=>`<div class="bubble bubble-${m.sender==='管理者'?'admin':'user'}"><b>${m.sender}:</b> <div>${m.content}</div></div>`).join('')}</div>
                        <div style="display:flex; gap:12px; margin-bottom:15px">
                            <select id="st-${t.id}"><option value="待處理" ${t.status=='待處理'?'selected':''}>待處理</option><option value="已解決" ${t.status=='已解決'?'selected':''}>已解決</option><option value="已退回" ${t.status=='已退回'?'selected':''}>已退回</option></select>
                            <select id="pr-${t.id}"><option value="1-緊急" ${t.priority=='1-緊急'?'selected':''}>1-緊急</option><option value="2-優先" ${t.priority=='2-優先'?'selected':''}>2-優先</option><option value="3-一般" ${t.priority=='3-一般'?'selected':''}>3-一般</option></select>
                        </div>
                        <div class="editor-container-wrapper"><div id="ed-${t.id}" class="editor-box"></div></div>
                        <button id="btn-${t.id}" onclick="adminReply('${t.id}','${t.email}','${t.title}')" style="width:100%; margin-top:15px">送出回覆並更新</button>
                    </div>`;
                area.appendChild(card);
                new Quill(`#ed-${t.id}`, { theme: 'snow', modules: qlModules });
            });
        }

        async function adminReply(id, email, title) {
            const btn = document.getElementById('btn-'+id); btn.classList.add('loading');
            try {
                const content = await compressHTML(document.querySelector(`#ed-${id} .ql-editor`).innerHTML);
                const data = { id, email, title, description: content, status: document.getElementById('st-'+id).value, priority: document.getElementById('pr-'+id).value, sender: "管理者" };
                await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
                showToast("更新成功！");
                await fetchData(); renderAdmin();
            } catch (e) { showToast("更新失敗"); }
            finally { btn.classList.remove('loading'); }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
