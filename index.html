<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBP 回報中心</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.lactame.com/lib/image-js/0.31.0/image.min.js"></script>
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-light: #eef2ff;
            --secondary: #06b6d4; 
            --bg: #f8fafc; 
            --sidebar: #ffffff; 
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #f1f5f9;
            --sidebar-width: 260px;
            --sidebar-collapsed-width: 85px;
            --stat-amber: #f59e0b;
            --stat-emerald: #10b981;
            --stat-critical: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', "Microsoft JhengHei", sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text-main); overflow: hidden; }
        nav { width: var(--sidebar-width); background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s; position: relative; }
        body.collapsed nav { width: var(--sidebar-collapsed-width); padding: 30px 15px; }
        .logo { font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; display: flex; align-items: center; gap: 12px; white-space: nowrap; overflow: hidden; height: 32px; }
        .toggle-sidebar { cursor: pointer; color: var(--text-sub); font-size: 1.2rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; flex-shrink: 0; width: 32px; height: 32px; }
        .toggle-sidebar:hover { color: var(--primary); background: var(--bg); border-radius: 8px; }
        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; cursor: pointer; color: var(--text-sub); transition: 0.2s all; display: flex; align-items: center; gap: 12px; font-weight: 600; text-decoration: none; overflow: hidden; white-space: nowrap; }
        .nav-item i { width: 20px; text-align: center; flex-shrink: 0; font-size: 1.1rem; }
        .nav-item span, .logo-text { transition: opacity 0.2s, visibility 0.2s; opacity: 1; visibility: visible; }
        body.collapsed .nav-item span, body.collapsed .logo-text { opacity: 0; visibility: hidden; width: 0; }
        body.collapsed .nav-item { justify-content: center; padding: 14px 0; }
        body.collapsed .logo { justify-content: center; gap: 0; }
        .nav-item:hover { background: var(--bg); color: var(--primary); }
        .nav-item.active { background: var(--primary-light); color: var(--primary); }
        .admin-footer { margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px; }
        main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; transition: all 0.3s; }
        .container { width: 100%; max-width: 900px; }
        .card { background: white; border-radius: 24px; padding: 30px; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 15px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; gap: 12px; flex-wrap: wrap; }
        .section-title { font-size: 1.5rem; font-weight: 800; margin: 0; display: flex; align-items: center; gap: 10px; }

        /* 需求3：週期選擇器 */
        .cycle-selector-wrap { display: flex; align-items: center; gap: 8px; background: white; padding: 6px 6px 6px 14px; border-radius: 50px; border: 1px solid var(--border); }
        .cycle-selector-label { font-size: 0.78rem; font-weight: 700; color: var(--text-sub); white-space: nowrap; }
        #cycle-select { font-size: 0.82rem; font-weight: 700; color: var(--primary); background: var(--primary-light); padding: 6px 12px; border-radius: 50px; border: none; cursor: pointer; outline: none; transition: 0.2s; width: auto; min-width: 120px; }
        #cycle-select:focus { box-shadow: 0 0 0 3px var(--primary-light); }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 35px; }
        .stat-card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); position: relative; }
        .stat-card.stat-clickable { cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card.stat-clickable:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
        .stat-card.stat-clickable::after { content: "點擊查看"; position: absolute; right: 18px; top: 18px; font-size: 0.75rem; color: #94a3b8; font-weight: 700; }
        .stat-card h3 { margin: 0; font-size: 0.85rem; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .value { font-size: 2.2rem; font-weight: 800; margin-top: 12px; display: block; }
        #stat-pending { color: var(--stat-amber); }
        #stat-resolved { color: var(--stat-emerald); }
        #stat-new { color: var(--primary); }
        .priority-badge { font-weight: 900; margin-right: 14px; display: inline-flex; align-items: center; line-height: 1; }
        .p-critical { color: var(--stat-critical); }
        .p-normal { color: var(--primary); }
        .resolved-badge { font-weight: 800; color: var(--stat-emerald); margin-right: 20px; }
        label { font-size: 0.9rem; font-weight: 700; color: var(--text-sub); margin-bottom: 8px; display: block; }
        input, select { width: 100%; padding: 14px; border: none; border-radius: 14px; font-size: 16px; background: #f1f5f9; outline: none; transition: 0.2s; color: var(--text-main); }
        textarea { font-size: 16px; }
        [contenteditable] { font-size: 16px; }
        .ql-editor { font-size: 16px; }
        input:focus, select:focus { background: #fff; box-shadow: 0 0 0 3px var(--primary-light); }
        .editor-wrapper { border: none; border-radius: 16px; overflow: hidden; margin-top: 8px; background: #f1f5f9; }
        .ql-toolbar.ql-snow { border: none !important; border-bottom: 1px solid #e2e8f0 !important; background: #fcfdfe; }
        .ql-container.ql-snow { border: none !important; min-height: 200px; }
        button { background: var(--primary); color: white; border: none; padding: 16px 28px; border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; justify-content: center; }
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(99,102,241,0.2); }
        .btn-ghost { background: #fff; color: var(--text-main); border: 1px solid var(--border); }
        .btn-ghost:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .collapsible-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .collapsible-content { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
        .card.expanded .collapsible-content { display: block; }
        .bubble { padding: 16px; border-radius: 18px; margin-bottom: 12px; border: 1.5px solid var(--border); background: #fff; }
        .bubble img { max-width: 220px; max-height: 160px; border-radius: 6px; border: 1px solid #ccc; margin-top: 10px; display: block; cursor: pointer; object-fit: contain; }
        #lightbox-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.78); display: none; z-index: 9999; align-items: center; justify-content: center; cursor: pointer; }
        #lightbox-overlay.active { display: flex; }
        #lightbox-overlay img { max-width: 90vw; max-height: 88vh; border-radius: 10px; object-fit: contain; cursor: pointer; }
        .bubble-admin { background: var(--primary-light); border-color: transparent; }

        /* 需求4：時間顯示 */
        .bubble-meta { font-size: 0.78rem; color: #94a3b8; font-weight: 700; }
        .ticket-time-bar { display: flex; gap: 18px; flex-wrap: wrap; margin-top: 12px; padding: 10px 14px; background: #f8fafc; border-radius: 12px; font-size: 0.8rem; font-weight: 700; color: var(--text-sub); }
        .ticket-time-bar span { display: flex; align-items: center; gap: 6px; }

        .admin-filter-bar { display: grid; grid-template-columns: auto 1fr 1fr; gap: 12px; margin-bottom: 20px; align-items: center; background: white; padding: 14px 18px; border-radius: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .admin-filter-bar .filter-title { font-weight: 800; color: var(--text-main); font-size: 0.9rem; display: inline-flex; align-items: center; gap: 10px; white-space: nowrap; }
        .admin-filter-bar select { background: #f8fafc; }
        .login-card { max-width: 420px; margin: 100px auto; text-align: center; padding: 45px; border-radius: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.04); }
        .login-card input[type="password"] { background: #f1f5f9; border-radius: 18px; padding: 18px; text-align: center; letter-spacing: 0.3em; font-size: 1.2rem; margin-bottom: 25px; }
        .search-card { display: flex; gap: 16px; align-items: center; }
        .search-card input { flex: 1; }
        .search-card button { flex-shrink: 0; min-width: 120px; }
        .ticket-row { cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
        .ticket-row:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
        .ticket-row .ticket-line { display:flex; align-items:center; gap: 10px; min-width:0; }
        .ticket-row .ticket-title { font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ticket-row .ticket-status { color: var(--text-sub); font-weight: 900; }
        .ticket-row .ticket-no { color: #94a3b8; font-weight: 900; flex-shrink: 0; }
        .modal-mask { position: fixed; inset: 0; background: rgba(15,23,42,0.55); display: none; z-index: 2000; align-items: center; justify-content: center; padding: 22px; }
        #ticket-modal-mask { z-index: 2100; }
        .modal { width: 100%; max-width: 980px; max-height: 86vh; background: #fff; border-radius: 24px; box-shadow: 0 30px 80px rgba(0,0,0,0.25); overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); gap: 12px; }
        .modal-title { font-weight: 900; font-size: 1.05rem; margin: 0; }
        .modal-sub { color: var(--text-sub); font-weight: 700; font-size: 0.85rem; }
        .modal-close { width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--border); background: #fff; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
        .modal-body { padding: 18px 20px; overflow: auto; background: #fcfdfe; }
        .modal-grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
        .modal-panel { background: #fff; border: 1px solid var(--border); border-radius: 18px; padding: 16px; }
        .pill { display: inline-flex; gap: 8px; align-items: center; padding: 6px 12px; border-radius: 999px; font-weight: 800; font-size: 0.8rem; border: 1px solid var(--border); background: #fff; }
        .pill.critical { border-color: rgba(239,68,68,0.25); color: var(--stat-critical); background: rgba(239,68,68,0.06); }
        .pill.priority { border-color: rgba(99,102,241,0.25); color: var(--primary); background: rgba(99,102,241,0.06); }
        .pill.ok { border-color: rgba(16,185,129,0.25); color: var(--stat-emerald); background: rgba(16,185,129,0.06); }
        .pill.warn { border-color: rgba(245,158,11,0.25); color: var(--stat-amber); background: rgba(245,158,11,0.06); }
        .modal-actions { display: flex; gap: 12px; align-items: center; justify-content: flex-end; margin-top: 12px; flex-wrap: wrap; }
        .modal-actions select { width: auto; min-width: 150px; }
        #toast { position: fixed; bottom: 30px; right: 30px; background: var(--text-main); color: white; padding: 16px 28px; border-radius: 16px; display: none; z-index: 3000; }
        .view { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* 急件篩選按鈕 */
        .urgent-filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .urgent-filter-btn { padding: 7px 18px; border-radius: 50px; font-size: 0.82rem; font-weight: 800; cursor: pointer; border: 1.5px solid var(--border); background: #fff; color: var(--text-sub); transition: 0.2s; }
        .urgent-filter-btn:hover { box-shadow: none; transform: none; background: var(--bg); }
        .urgent-filter-btn.active { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
        .urgent-filter-btn.btn-critical.active { background: rgba(239,68,68,0.08); color: #ef4444; border-color: rgba(239,68,68,0.4); }
        .urgent-filter-btn.btn-priority.active { background: rgba(249,115,22,0.08); color: #f97316; border-color: rgba(249,115,22,0.4); }

        /* 急件表格 */
        .urgent-table { width: 100%; border-collapse: separate; border-spacing: 0; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .urgent-table thead tr { background: #f8fafc; }
        .urgent-table th { padding: 12px 18px; font-size: 0.78rem; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.8px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
        .urgent-table td { padding: 14px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        .urgent-table tbody tr:last-child td { border-bottom: none; }
        .urgent-table tbody tr { cursor: pointer; transition: background 0.15s; }
        .urgent-table tbody tr:hover { background: #f8fafc; }
        .urgent-table .col-id { font-weight: 900; color: #94a3b8; white-space: nowrap; }
        .urgent-table .col-title { font-weight: 700; color: var(--text-main); }

        /* 嚴重度標籤 */
        .sev-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 11px; border-radius: 999px; font-size: 0.78rem; font-weight: 900; white-space: nowrap; }
        .sev-critical { background: rgba(239,68,68,0.10); color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
        .sev-priority { background: rgba(249,115,22,0.10); color: #f97316; border: 1px solid rgba(249,115,22,0.25); }

        /* 狀態標籤 (表格內用) */
        .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 999px; font-size: 0.78rem; font-weight: 800; white-space: nowrap; background: #f1f5f9; color: var(--text-sub); }
        .status-badge.inprogress { background: rgba(245,158,11,0.10); color: #d97706; }
        .status-badge.pending { background: rgba(99,102,241,0.08); color: var(--primary); }
        .status-badge.returned { background: rgba(239,68,68,0.08); color: #ef4444; }

        @media (max-width: 860px) {
            main { padding: 22px; }
            .stats-grid { grid-template-columns: 1fr; }
            .admin-filter-bar { grid-template-columns: 1fr; }
            .search-card { flex-direction: column; align-items: stretch; }
            .search-card button { width: 100%; }
            .stat-card.stat-clickable::after { display: none; }
            .header-row { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <nav id="sidebar">
        <div class="logo">
            <div class="toggle-sidebar" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
            <span class="logo-text" style="margin-left:10px;">BBP 回報中心</span>
        </div>
        <div class="nav-group">
            <div class="nav-item active" onclick="showView('dash-view',this)"><i class="fas fa-th-large"></i><span>總覽儀表板</span></div>
            <div class="nav-item" onclick="showView('report-view',this)"><i class="fas fa-plus-circle"></i><span>新增案件回報</span></div>
            <div class="nav-item" onclick="showView('status-view',this)"><i class="fas fa-search"></i><span>案件進度查詢</span></div>
        </div>
        <div class="admin-footer">
            <div class="nav-item" onclick="showView('login-view',this)"><i class="fas fa-user-shield"></i><span>管理者後台</span></div>
        </div>
    </nav>

    <main>
        <div class="container">

            <!-- 儀表板 -->
            <div id="dash-view" class="view active">
                <div class="header-row">
                    <div class="section-title">營運數據概況</div>
                    <!-- 需求3：週期切換 -->
                    <div class="cycle-selector-wrap">
                        <span class="cycle-selector-label"><i class="fas fa-calendar-week"></i> 報表週期</span>
                        <select id="cycle-select" onchange="onCycleChange()"><option value="">載入中...</option></select>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card stat-clickable" onclick="openBacklogModal()">
                        <h3>當前負載</h3><span class="value" id="stat-pending">0</span>
                    </div>
                    <!-- 需求1：本週進度可點擊 -->
                    <div class="stat-card stat-clickable" onclick="openResolvedModal()">
                        <h3>本週進度</h3><span class="value" id="stat-resolved">0</span>
                    </div>
                    <!-- 需求1：本週新增可點擊 -->
                    <div class="stat-card stat-clickable" onclick="openNewModal()">
                        <h3>本週新增</h3><span class="value" id="stat-new">0</span>
                    </div>
                </div>
                <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
                    <div class="section-title">🔥 急件關注</div>
                    <div class="urgent-filter-bar" style="margin-bottom:0;">
                        <button class="urgent-filter-btn active" onclick="setUrgentFilter('全部',this)">全部</button>
                        <button class="urgent-filter-btn btn-critical" onclick="setUrgentFilter('1-嚴重',this)">1-嚴重</button>
                        <button class="urgent-filter-btn btn-priority" onclick="setUrgentFilter('2-優先',this)">2-優先</button>
                    </div>
                </div>
                <div id="priority-list"></div>
                <div class="section-title" style="margin-top:40px;margin-bottom:20px;color:var(--stat-emerald);">✅ 本週已解決成果</div>
                <div id="resolved-list"></div>
            </div>

            <!-- 管理後台 -->
            <div id="admin-view" class="view">
                <div class="section-title" style="justify-content:space-between;align-items:center;">
                    <span>管理者後台</span>
                    <button class="btn-ghost" onclick="adminLogout()" style="padding:12px 16px;border-radius:14px;">
                        <i class="fas fa-right-from-bracket"></i> 登出
                    </button>
                </div>
                <div class="admin-filter-bar">
                    <div class="filter-title"><i class="fas fa-filter"></i> 快速過濾</div>
                    <select id="filter-status" onchange="renderAdmin()">
                        <option value="全部">所有狀態</option>
                        <option value="待處理">待處理</option>
                        <option value="進行中">進行中</option>
                        <option value="已解決">已解決</option>
                        <option value="已退回">已退回</option>
                    </select>
                    <select id="filter-priority" onchange="renderAdmin()">
                        <option value="全部">所有優先序</option>
                        <option value="1-嚴重">1-嚴重</option>
                        <option value="2-優先">2-優先</option>
                        <option value="3-一般">3-一般</option>
                    </select>
                </div>
                <div id="admin-list"></div>
            </div>

            <!-- 新增案件 -->
            <div id="report-view" class="view">
                <div class="section-title">建立新案件</div>
                <div class="card">
                    <!-- 範例快速套用區塊 -->
                    <div style="margin-bottom:20px;">
                        <div style="font-size:0.85rem;font-weight:700;color:var(--text-sub);margin-bottom:10px;">範例快速套用</div>
                        <div style="display:flex;gap:10px;flex-wrap:wrap;">
                            <button type="button" class="btn-ghost" onclick="applyExample('bug')" style="font-size:0.85rem;padding:10px 18px;border-radius:12px;">BUG 範例</button>
                            <button type="button" class="btn-ghost" onclick="applyExample('feature')" style="font-size:0.85rem;padding:10px 18px;border-radius:12px;">功能建議範例</button>
                            <button type="button" class="btn-ghost" onclick="applyExample('translation')" style="font-size:0.85rem;padding:10px 18px;border-radius:12px;">翻譯修正範例</button>
                        </div>
                    </div>
                    <form id="reportForm">
                        <label>聯絡 Email</label><input type="email" id="email" required placeholder="例：john@hcatwn.com（可於左側案件進度做查詢）">
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:20px 0;">
                            <div><label>案件分類</label>
                                <select id="type">
                                    <option value="BUG 回報">BUG 回報</option>
                                    <option value="功能建議">功能建議</option>
                                    <option value="翻譯修正">翻譯修正</option>
                                    <option value="其他">其他</option>
                                </select>
                            </div>
                            <div><label>案件標題</label><input type="text" id="title" required placeholder="例：點擊儲存後頁面白屏"></div>
                        </div>
                        <label>詳細描述</label>
                        <div style="background:#eff6ff;border-left:4px solid #60a5fa;border-radius:10px;padding:12px 16px;margin-bottom:10px;font-size:0.85rem;color:#1e40af;font-weight:600;line-height:1.6;">
                            好的描述包含：① 發生了什麼 ② 你預期的結果 ③ 重現步驟（如有）④ 截圖畫面
                        </div>
                        <div class="editor-wrapper"><div id="editor-user"></div></div>
                        <button type="submit" id="submitBtn" style="width:100%;margin-top:25px;"><i class="fas fa-paper-plane"></i> 提交案件回報</button>
                        <div style="margin-top:10px;text-align:center;color:var(--text-sub);font-size:0.85rem;font-weight:700;">預設優先序：3-一般</div>
                    </form>
                </div>
            </div>
            <script>

                    },

                        title: '設定頁面中文翻譯有誤',

    <!-- Backlog modal（當前負載） -->
    <div class="modal-mask" id="backlog-modal-mask" onclick="if(event.target.id==='backlog-modal-mask')closeBacklogModal()">
        <div class="modal">

                </div>

            </div>
            <div class="modal-body"><div id="backlog-modal-list"></div></div>
        </div>
    </div>

    <!-- 需求1：本週進度 modal -->
    <div class="modal-mask" id="resolved-modal-mask" onclick="if(event.target.id==='resolved-modal-mask')closeResolvedModal()">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="resolved-modal-title">本週進度 - 已解決案件</div>
                    <div class="modal-sub" id="resolved-modal-sub"></div>
                </div>
                <button class="modal-close" onclick="closeResolvedModal()"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body"><div id="resolved-modal-list"></div></div>
        </div>
    </div>

    <!-- 需求1：本週新增 modal -->
    <div class="modal-mask" id="new-modal-mask" onclick="if(event.target.id==='new-modal-mask')closeNewModal()">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="new-modal-title">本週新增 - 所有案件</div>
                    <div class="modal-sub" id="new-modal-sub"></div>
                </div>
                <button class="modal-close" onclick="closeNewModal()"><i class="fas fa-xmark"></i></button>
            </div>
            <div class="modal-body"><div id="new-modal-list"></div></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz5i3qIe1lZhsbzw0E6kJF85nef6-xi_cajjwWqS-HqVUYsxE_XA7GjQqOxTm7VVVJbpQ/exec";
        const qlModules = { toolbar: [['bold','italic'],[{list:'bullet'}],['image']] };

        let allData = [];
        let ticketIndex = {};
        let allCycles = [];
        let selectedCycle = "";
        let latestCycleValue = "";
        let shortNoCounter = 0;
        let isAdmin = false;
        let modalUserQuill = null;
        let modalAdminQuill = null;
        let userQuill = null;
        let urgentFilter = '全部';

        function syncAdminStateFromStorage() { isAdmin = sessionStorage.getItem('bbp_is_admin') === '1'; }
        syncAdminStateFromStorage();
        userQuill = new Quill('#editor-user', { theme:'snow', modules:qlModules });

        /* ── 工具 ── */
        function toggleSidebar() { document.body.classList.toggle('collapsed'); }

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if (el) el.classList.add('active');
            if (id === 'dash-view') fetchData();
            if (id === 'admin-view') { syncAdminStateFromStorage(); if (!isAdmin) showView('login-view'); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        function escapeHtml(str) {
            return String(str ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }
        function escapeJs(str) {
            return String(str ?? '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ').replace(/\r/g,' ');
        }

        /* 需求4：時間格式化 */
        function formatTime(raw) {
            if (!raw) return '—';
            const d = new Date(raw);
            if (isNaN(d.getTime())) return String(raw);
            const p = n => String(n).padStart(2,'0');
            return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
        }

        async function compressHTML(html) {
            const div = document.createElement('div'); div.innerHTML = html;
            for (let img of div.querySelectorAll('img')) {
                const src = img.getAttribute('src');
                if (src && src.startsWith('data:image/') && src.length > 5000) {
                    try {
                        const image = await Image.load(src);
                        const resized = image.width > 500 ? image.resize({ width:500 }) : image;
                        img.setAttribute('src', resized.toDataURL('image/jpeg', 0.4));
                    } catch(e) { console.warn(e); }
                }
            }
            return div.innerHTML;
        }

        /* ── 資料 ── */
        async function fetchData() {
            try {
                const res = await fetch(GAS_URL);
                allData = await res.json();
                buildTicketIndex();
                buildCycleSelector();
                renderDashboard();
                if (document.getElementById('admin-view').classList.contains('active') && isAdmin) renderAdmin();
            } catch(e) { showToast("連線失敗"); }
        }

        function buildTicketIndex() {
            ticketIndex = {};
            if (!Array.isArray(allData) || allData.length < 2) return;
            shortNoCounter = 0;
            latestCycleValue = allData[allData.length-1][10];
            allData.slice(1).forEach(row => {
                const id = row[0];
                if (!ticketIndex[id]) {
                    ticketIndex[id] = {
                        id,
                        shortNo: ++shortNoCounter,
                        createdAt: row[1],   // B：建立時間
                        email:     row[2],
                        type:      row[3],
                        title:     row[4],
                        status:    row[7],
                        updatedAt: row[8],   // I：更新時間
                        priority:  row[9],
                        cycle:     row[10],
                        msgs: []
                    };
                }
                ticketIndex[id].msgs.push({ sender: row[6], content: row[5], time: row[8] });
                // 以最新行更新狀態
                ticketIndex[id].status    = row[7];
                ticketIndex[id].updatedAt = row[8];
                ticketIndex[id].priority  = row[9];
                ticketIndex[id].cycle     = row[10];
            });
        }

        /* ── 需求3：週期選單 ── */

        /* 前端自行計算當前週期（與 GAS 邏輯一致：週三 19:00 台灣時間為截止點） */
        function getCurrentCycle() {
            const now = new Date();
            // 轉為台灣時間 UTC+8
            const tw = new Date(now.getTime() + 8 * 60 * 60 * 1000);
            const day  = tw.getUTCDay();    // 0=日,1=一,...,6=六
            const hour = tw.getUTCHours();
            const min  = tw.getUTCMinutes();

            // 是否已過本週三 19:00
            const pastCutoff = (day === 3 && (hour > 19 || (hour === 19 && min > 0)))
                             || day === 4 || day === 5 || day === 6 || day === 0;

            // 找本週期對應的「週三」日期
            const base = new Date(tw);
            const diffToWed = pastCutoff
                ? (3 - day + 7) % 7 || 7   // 已過截止：找下一個週三
                : 3 - day;                  // 未過截止：找本週三
            base.setUTCDate(tw.getUTCDate() + diffToWed);

            // 計算 ISO week number
            const year = base.getUTCFullYear();
            const jan4 = new Date(Date.UTC(year, 0, 4));
            const jan4Day = jan4.getUTCDay() || 7;
            const firstMonday = new Date(jan4);
            firstMonday.setUTCDate(jan4.getUTCDate() - (jan4Day - 1));
            const weekNum = Math.floor((base.getTime() - firstMonday.getTime()) / (7 * 24 * 60 * 60 * 1000)) + 1;

            return `${year}-W${String(weekNum).padStart(2, '0')}`;
        }

        function buildCycleSelector() {
            const cycleSet = new Set();
            Object.values(ticketIndex).forEach(t => { if (t.cycle) cycleSet.add(t.cycle); });

            // 永遠把當前週期加進去，即使沒有案件也要出現
            const currentCycle = getCurrentCycle();
            cycleSet.add(currentCycle);

            allCycles = Array.from(cycleSet).sort().reverse();

            const sel = document.getElementById('cycle-select');
            // 若使用者已手動切換週期則保留，否則預設為當前週期
            const preferred = selectedCycle || currentCycle;
            sel.innerHTML = allCycles.map(c =>
                `<option value="${escapeHtml(c)}" ${c === preferred ? 'selected':''}>${escapeHtml(c)}</option>`
            ).join('');
            selectedCycle = sel.value;
        }

        function onCycleChange() {
            selectedCycle = document.getElementById('cycle-select').value;
            renderDashboard();
        }

        /* ── 儀表板 ── */
        function renderDashboard() {
            if (!Array.isArray(allData) || allData.length < 2) return;
            const ticketList = Object.values(ticketIndex);
            const cycle = selectedCycle || latestCycleValue;

            // 當前負載（全域，不受週期影響）
            document.getElementById('stat-pending').innerText =
                ticketList.filter(t => t.status === '待處理' || t.status === '進行中' || t.status === '已退回').length;

            // 本週進度（選取週期已解決）
            document.getElementById('stat-resolved').innerText =
                ticketList.filter(t => t.status === '已解決' && t.cycle === cycle).length;

            // 本週新增（選取週期所有案件）
            document.getElementById('stat-new').innerText =
                ticketList.filter(t => t.cycle === cycle).length;

            // 急件（全域）
            renderUrgentTable(ticketList);

            // 本週已解決（選取週期）
            const resolvedArea = document.getElementById('resolved-list');
            resolvedArea.innerHTML = '';
            const weekResolved = ticketList.filter(t => t.status==='已解決' && t.cycle===cycle);
            if (weekResolved.length) {
                weekResolved.forEach(t => {
                    resolvedArea.innerHTML += `
                        <div class="card ticket-row" onclick="openTicketModal('${t.id}')"
                            style="display:flex;justify-content:space-between;align-items:center;padding:20px;opacity:0.75;background:#fcfdfc;">
                            <div class="ticket-line">
                                <span class="ticket-no">#${t.shortNo}</span>
                                <b class="resolved-badge"><i class="fas fa-check-circle"></i> 已解決</b>
                                <span class="ticket-title" style="text-decoration:line-through;color:var(--text-sub);font-weight:800;">${escapeHtml(t.title)}</span>
                            </div>
                            <i class="fas fa-chevron-right" style="color:#cbd5e1"></i>
                        </div>`;
                });
            } else {
                resolvedArea.innerHTML = `<div style="text-align:center;padding:20px;color:var(--text-sub);font-size:0.9rem;">本週期尚無已解決案件</div>`;
            }
        }

        /* ── 急件篩選 ── */
        function setUrgentFilter(filter, btn) {
            urgentFilter = filter;
            document.querySelectorAll('.urgent-filter-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            renderUrgentTable(Object.values(ticketIndex));
        }

        function severityBadge(p) {
            p = String(p || '');
            if (p.includes('嚴重')) return `<span class="sev-badge sev-critical"><i class="fas fa-triangle-exclamation"></i>${escapeHtml(p)}</span>`;
            if (p.includes('優先')) return `<span class="sev-badge sev-priority"><i class="fas fa-bolt"></i>${escapeHtml(p)}</span>`;
            return `<span class="sev-badge">${escapeHtml(p)}</span>`;
        }

        function statusBadge(s) {
            s = String(s || '');
            let cls = '';
            if (s === '進行中') cls = 'inprogress';
            else if (s === '待處理') cls = 'pending';
            else if (s === '已退回') cls = 'returned';
            const icons = { '進行中': 'fa-spinner', '待處理': 'fa-inbox', '已退回': 'fa-rotate-left', '已解決': 'fa-check' };
            const icon = icons[s] || 'fa-circle';
            return `<span class="status-badge ${cls}"><i class="fas ${icon}"></i>${escapeHtml(s)}</span>`;
        }

        function renderUrgentTable(ticketList) {
            const listArea = document.getElementById('priority-list');
            let items = ticketList
                .filter(t => (t.status==='待處理'||t.status==='進行中'||t.status==='已退回') && (String(t.priority).includes('嚴重')||String(t.priority).includes('優先')))
                .sort((a,b) => String(a.priority).localeCompare(String(b.priority)));
            if (urgentFilter !== '全部') {
                items = items.filter(t => String(t.priority).startsWith(urgentFilter.charAt(0)));
            }
            if (!items.length) {
                listArea.innerHTML = `<div class="card" style="text-align:center;color:var(--text-sub);">目前沒有符合條件的急件</div>`;
                return;
            }
            listArea.innerHTML = `
                <table class="urgent-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>嚴重度</th>
                            <th>狀態</th>
                            <th>標題</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${items.map(t => `
                        <tr onclick="openTicketModalFromList('${t.id}')">
                            <td class="col-id">#${t.shortNo}</td>
                            <td>${severityBadge(t.priority)}</td>
                            <td>${statusBadge(t.status)}</td>
                            <td class="col-title">${escapeHtml(t.title)}</td>
                        </tr>`).join('')}
                    </tbody>
                </table>`;
        }

        /* ── Pill ── */
        function statusPill(s) {
            s = String(s||'');
            if (s==='已解決') return `<span class="pill ok"><i class="fas fa-check"></i>${s}</span>`;
            if (s==='進行中') return `<span class="pill warn"><i class="fas fa-spinner"></i>${s}</span>`;
            if (s==='已退回') return `<span class="pill warn"><i class="fas fa-rotate-left"></i>${s}</span>`;
            return `<span class="pill"><i class="fas fa-inbox"></i>${escapeHtml(s)}</span>`;
        }
        function priorityPill(p) {
            p = String(p||'');
            if (p.includes('嚴重')) return `<span class="pill critical"><i class="fas fa-triangle-exclamation"></i>${escapeHtml(p)}</span>`;
            if (p.includes('優先')) return `<span class="pill priority"><i class="fas fa-bolt"></i>${escapeHtml(p)}</span>`;
            return `<span class="pill"><i class="fas fa-flag"></i>${escapeHtml(p)}</span>`;
        }

        /* 通用案件列 */
        function ticketRowHtml(t) {
            const pClass = String(t.priority).includes('嚴重') ? 'p-critical' : 'p-normal';
            return `
                <div class="card ticket-row" onclick="openTicketModalFromList('${t.id}')"
                    style="display:flex;justify-content:space-between;align-items:center;padding:18px 20px;">
                    <div class="ticket-line">
                        <span class="ticket-no">#${t.shortNo}</span>
                        <span class="priority-badge ${pClass}">${escapeHtml(t.priority)}</span>
                        <span class="ticket-title"><span class="ticket-status">[${escapeHtml(t.status)}]</span> ${escapeHtml(t.title)}</span>
                    </div>
                    <i class="fas fa-chevron-right" style="color:#cbd5e1"></i>
                </div>`;
        }

        function openTicketModalFromList(id) {
            closeBacklogModal(); closeResolvedModal(); closeNewModal();
            openTicketModal(id);
        }

        /* ── 需求1：本週進度 Modal ── */
        function openResolvedModal() {
            const cycle = selectedCycle || latestCycleValue;
            const list = Object.values(ticketIndex).filter(t => t.status==='已解決' && t.cycle===cycle);
            document.getElementById('resolved-modal-title').innerText = `本週進度 - 已解決案件`;
            document.getElementById('resolved-modal-sub').innerText = `週期 ${cycle}，共 ${list.length} 件`;
            document.getElementById('resolved-modal-list').innerHTML = list.length
                ? list.map(t => ticketRowHtml(t)).join('')
                : `<div class="card" style="text-align:center;color:var(--text-sub);">本週期尚無已解決案件</div>`;
            document.getElementById('resolved-modal-mask').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeResolvedModal() {
            document.getElementById('resolved-modal-mask').style.display = 'none';
            document.body.style.overflow = '';
        }

        /* ── 需求1：本週新增 Modal ── */
        function openNewModal() {
            const cycle = selectedCycle || latestCycleValue;
            const list = Object.values(ticketIndex).filter(t => t.cycle===cycle);
            document.getElementById('new-modal-title').innerText = `本週新增 - 所有案件`;
            document.getElementById('new-modal-sub').innerText = `週期 ${cycle}，共 ${list.length} 件`;
            document.getElementById('new-modal-list').innerHTML = list.length
                ? list.map(t => ticketRowHtml(t)).join('')
                : `<div class="card" style="text-align:center;color:var(--text-sub);">本週期尚無案件</div>`;
            document.getElementById('new-modal-mask').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeNewModal() {
            document.getElementById('new-modal-mask').style.display = 'none';
            document.body.style.overflow = '';
        }

        /* ── Ticket Modal ── */
        function openTicketModal(id) {
            if (document.getElementById('backlog-modal-mask').style.display === 'flex') closeBacklogModal();
            const t = ticketIndex[id];
            if (!t) return showToast("找不到案件資料");

            document.getElementById('ticket-modal-title').innerText = t.title || '(未命名案件)';
            document.getElementById('ticket-modal-sub').innerText = `案件 #${t.shortNo} · 回報者: ${t.email || '-'}`;

            // 需求4：建立時間 & 更新時間
            document.getElementById('ticket-modal-meta').innerHTML = `
                <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
                    ${statusPill(t.status)} ${priorityPill(t.priority)}
                    <span class="pill"><i class="fas fa-calendar-week"></i>週期 ${escapeHtml(t.cycle)}</span>
                </div>
                <div class="ticket-time-bar">
                    <span><i class="fas fa-clock"></i> 建立時間：${formatTime(t.createdAt)}</span>
                    <span><i class="fas fa-rotate"></i> 最後更新：${formatTime(t.updatedAt)}</span>
                </div>
                <div style="margin-top:10px;color:var(--text-sub);font-weight:700;font-size:0.9rem;">
                    提示：一般使用者僅可查看；若案件為「已退回」，可在下方補充內容再送出。
                </div>`;

            // 需求4：每則對話顯示時間
            document.getElementById('ticket-modal-thread').innerHTML = `
                <div style="font-weight:900;margin-bottom:10px;">對話內容</div>
                ${t.msgs.map(m => `
                    <div class="bubble bubble-${m.sender==='管理者'?'admin':'user'}">
                        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
                            <b>${escapeHtml(m.sender||'')}</b>
                            <span class="bubble-meta"><i class="fas fa-clock"></i> ${formatTime(m.time)}</span>
                        </div>
                        <div style="margin-top:6px;">${m.content||''}</div>
                    </div>`).join('')}`;

            // 使用者補充（已退回）
            const userReplyPanel = document.getElementById('ticket-modal-user-reply');
            userReplyPanel.style.display = 'none'; userReplyPanel.innerHTML = '';
            if (String(t.status) === '已退回') {
                userReplyPanel.style.display = 'block';
                userReplyPanel.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
                        <div style="font-weight:900;">補充說明（送回管理者）</div>
                        <span style="color:var(--text-sub);font-weight:800;font-size:0.85rem;">送出後狀態會回到「待處理」</span>
                    </div>
                    <div class="editor-wrapper" style="margin-top:12px;"><div id="modal-user-editor"></div></div>
                    <div class="modal-actions">
                        <button onclick="submitUserReply('${t.id}')" style="min-width:180px;"><i class="fas fa-paper-plane"></i> 送出補充</button>
                    </div>`;
            }

            // 管理者操作
            const adminPanel = document.getElementById('ticket-modal-admin-actions');
            adminPanel.style.display = 'none'; adminPanel.innerHTML = '';
            syncAdminStateFromStorage();
            if (isAdmin) {
                adminPanel.style.display = 'block';
                adminPanel.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
                        <div style="font-weight:900;">管理者操作</div>
                        <span style="color:var(--text-sub);font-weight:800;font-size:0.85rem;">可直接在儀表板回覆/更新狀態</span>
                    </div>
                    <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;">
                        <select id="modal-admin-status">
                            <option value="待處理" ${t.status=='待處理'?'selected':''}>待處理</option>
                            <option value="進行中" ${t.status=='進行中'?'selected':''}>進行中</option>
                            <option value="已解決" ${t.status=='已解決'?'selected':''}>已解決</option>
                            <option value="已退回" ${t.status=='已退回'?'selected':''}>已退回</option>
                        </select>
                        <select id="modal-admin-priority">
                            <option value="1-嚴重" ${t.priority=='1-嚴重'?'selected':''}>1-嚴重</option>
                            <option value="2-優先" ${t.priority=='2-優先'?'selected':''}>2-優先</option>
                            <option value="3-一般" ${t.priority=='3-一般'?'selected':''}>3-一般</option>
                        </select>
                    </div>
                    <div class="editor-wrapper" style="margin-top:12px;"><div id="modal-admin-editor"></div></div>
                    <div class="modal-actions">
                        <button onclick="submitAdminUpdateFromDashboard('${t.id}')" style="min-width:220px;"><i class="fas fa-paper-plane"></i> 送出回覆並更新</button>
                    </div>`;
            }

            setTimeout(() => {
                if (document.getElementById('modal-user-editor')) {
                    document.getElementById('modal-user-editor').innerHTML = '';
                    modalUserQuill = new Quill('#modal-user-editor', { theme:'snow', modules:qlModules });
                }
                if (document.getElementById('modal-admin-editor')) {
                    document.getElementById('modal-admin-editor').innerHTML = '';
                    modalAdminQuill = new Quill('#modal-admin-editor', { theme:'snow', modules:qlModules });
                }
            }, 0);

            document.getElementById('ticket-modal-mask').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeTicketModalIfMask(e) { if (e.target.id==='ticket-modal-mask') closeTicketModal(); }
        function closeTicketModal() { document.getElementById('ticket-modal-mask').style.display='none'; document.body.style.overflow=''; }

        /* ── Backlog Modal ── */
        function openBacklogModal() {
            const backlog = Object.values(ticketIndex)
                .filter(t => t.status!=='已解決')
                .sort((a,b) => String(a.priority).localeCompare(String(b.priority)));
            const list = document.getElementById('backlog-modal-list');
            list.innerHTML = backlog.length ? backlog.map(t => ticketRowHtml(t)).join('')
                : `<div class="card" style="text-align:center;color:var(--text-sub);">目前沒有待處理案件</div>`;
            document.getElementById('backlog-modal-mask').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }
        function closeBacklogModal() { document.getElementById('backlog-modal-mask').style.display='none'; document.body.style.overflow=''; }

        /* ── 表單提交 ── */
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.disabled = true;
            try {
                const content = await compressHTML(userQuill.root.innerHTML);
                const emailRaw = document.getElementById('email').value.trim();
                const defaultStatus = emailRaw.toLowerCase() === 'riku@hcatwn.com' ? '進行中' : '待處理';
                await fetch(GAS_URL, { method:"POST", body: JSON.stringify({
                    email: emailRaw,
                    type: document.getElementById('type').value,
                    title: document.getElementById('title').value.trim(),
                    description: content,
                    priority: "3-一般",
                    status: defaultStatus
                })});
                showToast("提交成功！");
                userQuill.setContents([]); e.target.reset();
                await fetchData(); showView('dash-view');
            } catch(e) { showToast("提交失敗"); }
            finally { btn.disabled = false; }
        };

        /* ── 案件查詢 ── */
        async function searchUserTickets() {
            const email = document.getElementById('searchEmail').value.trim().toLowerCase();
            if (!email) return showToast("請輸入 Email");
            const btn = document.getElementById('searchBtn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            await fetchData();
            btn.innerHTML = '<i class="fas fa-search"></i> 搜尋';
            const area = document.getElementById('user-result-list'); area.innerHTML = '';
            const userTickets = Object.values(ticketIndex)
                .filter(t => String(t.email||'').toLowerCase().trim() === email).reverse();

            if (!userTickets.length) {
                area.innerHTML = `<div class="card" style="text-align:center;color:var(--text-sub);">查無案件，請確認 Email 是否正確</div>`;
                return;
            }
            userTickets.forEach(t => {
                const card = document.createElement('div'); card.className = 'card';
                const canReply = String(t.status) === '已退回';
                card.innerHTML = `
                    <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <div style="min-width:0;">
                            <b style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-block;max-width:720px;">
                                ${escapeHtml(t.title)}
                                <small style="margin-left:10px;color:var(--primary)">[${escapeHtml(t.status)}]</small>
                            </b>
                            <div style="font-size:0.78rem;color:#94a3b8;font-weight:700;margin-top:3px;">
                                建立：${formatTime(t.createdAt)} &nbsp;·&nbsp; 更新：${formatTime(t.updatedAt)}
                            </div>
                        </div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="collapsible-content">
                        ${t.msgs.map(m=>`
                            <div class="bubble bubble-${m.sender==='管理者'?'admin':'user'}">
                                <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
                                    <b>${escapeHtml(m.sender)}:</b>
                                    <span class="bubble-meta"><i class="fas fa-clock"></i> ${formatTime(m.time)}</span>
                                </div>
                                <div style="margin-top:6px;">${m.content}</div>
                            </div>`).join('')}
                        ${canReply ? `
                            <div style="margin-top:18px;font-weight:900;">補充說明（送回管理者）</div>
                            <div class="editor-wrapper" style="margin-top:10px;"><div id="status-ed-${t.id}"></div></div>
                            <div class="modal-actions" style="justify-content:flex-start;">
                                <button onclick="submitUserReply('${t.id}','status-ed-${t.id}')" style="min-width:180px;">
                                    <i class="fas fa-paper-plane"></i> 送出補充
                                </button>
                            </div>` : `
                            <div style="margin-top:18px;color:var(--text-sub);font-weight:700;font-size:0.9rem;">
                                此案件目前非「已退回」，因此無需補充送出。
                            </div>`}
                    </div>`;
                area.appendChild(card);
                if (canReply) new Quill(`#status-ed-${t.id}`, { theme:'snow', modules:qlModules });
            });
        }

        /* ── 管理者 ── */
        function checkAdminLogin() {
            if (document.getElementById('adminPassword').value === 'admin123') {
                sessionStorage.setItem('bbp_is_admin','1'); isAdmin = true;
                showView('admin-view'); renderAdmin();
            } else showToast("密碼錯誤");
        }
        function adminLogout() {
            sessionStorage.removeItem('bbp_is_admin'); isAdmin = false;
            showToast("已登出"); showView('dash-view');
        }

        function renderAdmin() {
            syncAdminStateFromStorage(); if (!isAdmin) return;
            const area = document.getElementById('admin-list');
            const sf = document.getElementById('filter-status').value;
            const pf = document.getElementById('filter-priority').value;
            area.innerHTML = '';
            Object.values(ticketIndex).reverse().forEach(t => {
                if (sf !== '全部' && t.status !== sf) return;
                if (pf !== '全部' && t.priority !== pf) return;
                const card = document.createElement('div'); card.className = 'card';
                const pClass = String(t.priority).includes('嚴重') ? 'p-critical' : 'p-normal';
                card.innerHTML = `
                    <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <b style="min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:inline-block;max-width:660px;">
                            ${escapeHtml(t.title)} (${escapeHtml(t.email)})
                        </b>
                        <b class="priority-badge ${pClass}" style="flex-shrink:0;">${escapeHtml(t.priority)}</b>
                    </div>
                    <div class="collapsible-content">
                        <div style="font-size:0.78rem;color:#94a3b8;font-weight:700;margin-bottom:14px;">
                            建立：${formatTime(t.createdAt)} &nbsp;·&nbsp; 最後更新：${formatTime(t.updatedAt)}
                        </div>
                        <div style="margin-bottom:20px;">
                            ${t.msgs.map(m=>`
                                <div class="bubble bubble-${m.sender==='管理者'?'admin':'user'}">
                                    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
                                        <b>${escapeHtml(m.sender)}:</b>
                                        <span class="bubble-meta"><i class="fas fa-clock"></i> ${formatTime(m.time)}</span>
                                    </div>
                                    <div style="margin-top:6px;">${m.content}</div>
                                </div>`).join('')}
                        </div>
                        <div style="display:flex;gap:12px;margin-bottom:15px;flex-wrap:wrap;">
                            <select id="st-${t.id}">
                                <option value="待處理" ${t.status=='待處理'?'selected':''}>待處理</option>
                                <option value="進行中" ${t.status=='進行中'?'selected':''}>進行中</option>
                                <option value="已解決" ${t.status=='已解決'?'selected':''}>已解決</option>
                                <option value="已退回" ${t.status=='已退回'?'selected':''}>已退回</option>
                            </select>
                            <select id="pr-${t.id}">
                                <option value="1-嚴重" ${t.priority=='1-嚴重'?'selected':''}>1-嚴重</option>
                                <option value="2-優先" ${t.priority=='2-優先'?'selected':''}>2-優先</option>
                                <option value="3-一般" ${t.priority=='3-一般'?'selected':''}>3-一般</option>
                            </select>
                        </div>
                        <div class="editor-wrapper"><div id="ed-${t.id}"></div></div>
                        <button id="btn-${t.id}" onclick="adminReply('${t.id}','${escapeJs(t.email)}','${escapeJs(t.title)}')" style="width:100%;margin-top:15px;">送出回覆並更新</button>
                    </div>`;
                area.appendChild(card);
                new Quill(`#ed-${t.id}`, { theme:'snow', modules:qlModules });
            });
            if (!area.innerHTML.trim())
                area.innerHTML = "<div class='card' style='text-align:center;color:var(--text-sub);'>此過濾條件下無相關案件</div>";
        }

        async function adminReply(id, email, title) {
            const btn = document.getElementById('btn-'+id); btn.disabled = true;
            try {
                const content = await compressHTML(document.querySelector(`#ed-${id} .ql-editor`).innerHTML);
                await fetch(GAS_URL, { method:"POST", body: JSON.stringify({
                    id, email, title, description: content,
                    status: document.getElementById('st-'+id).value,
                    priority: document.getElementById('pr-'+id).value,
                    sender: "管理者"
                })});
                showToast("更新成功！"); await fetchData(); renderAdmin();
            } catch(e) { showToast("更新失敗"); }
            finally { btn.disabled = false; }
        }

        async function submitAdminUpdateFromDashboard(id) {
            const t = ticketIndex[id]; if (!t) return showToast("找不到案件資料");
            syncAdminStateFromStorage(); if (!isAdmin) return showToast("僅管理者可操作");
            try {
                const content = await compressHTML(document.querySelector('#modal-admin-editor .ql-editor').innerHTML);
                await fetch(GAS_URL, { method:"POST", body: JSON.stringify({
                    id: t.id, email: t.email, title: t.title, description: content,
                    status: document.getElementById('modal-admin-status').value,
                    priority: document.getElementById('modal-admin-priority').value,
                    sender: "管理者"
                })});
                showToast("更新成功！"); await fetchData(); openTicketModal(id);
            } catch(e) { showToast("更新失敗"); }
        }

        async function submitUserReply(id, editorRootId) {
            const t = ticketIndex[id]; if (!t) return showToast("找不到案件資料");
            if (String(t.status) !== '已退回') return showToast("此案件目前不需補充");
            try {
                let editorHtml = '';
                if (editorRootId) editorHtml = document.querySelector(`#${editorRootId} .ql-editor`).innerHTML;
                else if (document.querySelector('#modal-user-editor .ql-editor')) editorHtml = document.querySelector('#modal-user-editor .ql-editor').innerHTML;
                else return showToast("找不到編輯器");
                const content = await compressHTML(editorHtml);
                await fetch(GAS_URL, { method:"POST", body: JSON.stringify({
                    id: t.id, email: t.email, title: t.title, description: content,
                    status: "待處理", priority: t.priority, sender: "使用者"
                })});
                showToast("已送出補充！"); await fetchData();
                if (document.getElementById('ticket-modal-mask').style.display==='flex') openTicketModal(id);
                if (document.getElementById('status-view').classList.contains('active')) searchUserTickets();
            } catch(e) { showToast("送出失敗"); }
        }

        window.addEventListener('keydown', e => {
            if (e.key !== 'Escape') return;
            if (document.getElementById('ticket-modal-mask').style.display==='flex') closeTicketModal();
            if (document.getElementById('backlog-modal-mask').style.display==='flex') closeBacklogModal();
            if (document.getElementById('resolved-modal-mask').style.display==='flex') closeResolvedModal();
            if (document.getElementById('new-modal-mask').style.display==='flex') closeNewModal();
        });

        window.onload = fetchData;
    </script>

    <!-- Lightbox overlay -->
    <div id="lightbox-overlay" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation();closeLightbox();">
    </div>
    <script>
        function openLightbox(src) {
            var overlay = document.getElementById('lightbox-overlay');
            document.getElementById('lightbox-img').src = src;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('lightbox-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }
        document.addEventListener('click', function(e) {
            if (e.target.matches('.bubble img')) {
                openLightbox(e.target.src);
            }
        });
    </script>
</body>
</html>
