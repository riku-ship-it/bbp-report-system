<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBP 回報系統</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.lactame.com/lib/image-js/0.31.0/image.min.js"></script>
    <style>
        :root { --primary: #6366f1; --secondary: #06b6d4; --bg: #f8fafc; --sidebar: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', "Microsoft JhengHei", sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: #1e293b; overflow: hidden; }
        
        /* 導覽列 */
        nav { width: 280px; background: var(--sidebar); border-right: 1px solid #f1f5f9; display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.6rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; display: flex; align-items: center; gap: 12px; }
        .nav-item { padding: 14px 18px; border-radius: 16px; cursor: pointer; color: #64748b; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: #eef2ff; color: var(--primary); }
        .nav-footer { margin-top: auto; border-top: 1px solid #f1f5f9; padding-top: 20px; }

        /* 主區域 */
        main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 850px; }
        .card { background: white; border-radius: 24px; padding: 30px; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; transition: 0.3s; }
        
        /* 收合組件樣式 */
        .collapsible-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .collapsible-content { display: none; margin-top: 20px; border-top: 1px solid #f1f5f9; padding-top: 20px; }
        .card.expanded .collapsible-content { display: block; }
        .chevron { transition: 0.3s; color: #94a3b8; }
        .card.expanded .chevron { transform: rotate(180deg); }

        /* 搜尋列 */
        .filter-bar { display: flex; align-items: center; gap: 12px; padding: 20px 25px; }
        .filter-bar input, .filter-bar select { margin: 0; }

        /* 對話內容 */
        .thread-container { margin: 20px 0; }
        .bubble { padding: 15px; border-radius: 16px; margin-bottom: 12px; max-width: 90%; line-height: 1.6; font-size: 0.95rem; }
        .bubble-user { background: #f1f5f9; border-bottom-left-radius: 4px; }
        .bubble-admin { background: #eef2ff; border-left: 5px solid var(--primary); margin-left: auto; border-bottom-right-radius: 4px; }
        .bubble-time { font-size: 0.7rem; color: #94a3b8; margin-top: 5px; display: block; }
        .bubble-name { font-weight: 700; font-size: 0.8rem; margin-bottom: 5px; display: block; }

        .ql-editor img, .card img { max-width: 100% !important; height: auto !important; border-radius: 12px; margin: 10px 0; display: block; }
        .editor-box { height: 200px; margin-bottom: 10px; border-radius: 0 0 16px 16px; }
        
        input, select, textarea { width: 100%; padding: 12px 16px; border: 2px solid #f1f5f9; border-radius: 14px; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; padding: 14px 30px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        button .spinner { display: none; animation: spin 1s linear infinite; }
        button.loading .spinner { display: inline-block; }
        button.loading { opacity: 0.7; pointer-events: none; }
        @keyframes spin { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }

        .status-badge { padding: 6px 16px; border-radius: 50px; font-size: 0.8rem; font-weight: 800; }
        .待處理 { background: #fffbeb; color: #92400e; border: 1px solid #fde68a; }
        .已解決 { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
        .已退回 { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

        #toast { position: fixed; top: 24px; right: 24px; background: #1e293b; color: white; padding: 16px 32px; border-radius: 16px; display: none; z-index: 1000; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
        .view { display: none; width: 100%; }
        .view.active { display: block; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-comment-dots"></i> BBP 回報系統</div>
        <div class="nav-item active" onclick="showView('report-view', this)"><i class="fas fa-plus-circle"></i> 新增回報</div>
        <div class="nav-item" onclick="showView('status-view', this)"><i class="fas fa-history"></i> 案件追蹤</div>
        <div class="nav-item" onclick="showView('faq-view', this)"><i class="fas fa-lightbulb"></i> 精選案例</div>
        <div class="nav-footer">
            <div class="nav-item" onclick="showView('login-view', this)"><i class="fas fa-user-shield"></i> 管理登入</div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div id="report-view" class="view active">
                <h1>發送您的想法 🚀</h1>
                <div class="card">
                    <form id="reportForm">
                        <label>聯絡 Email</label><input type="email" id="email" required>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top:15px">
                            <div><label>案件分類</label><select id="type"><option>BUG 回報</option><option>功能建議</option></select></div>
                            <div><label>回報標題</label><input type="text" id="title" required></div>
                        </div>
                        <label style="margin-top:15px; display:block">詳細描述</label>
                        <div id="editor-user" class="editor-box"></div>
                        <button type="submit" id="submitBtn"><i class="fas fa-spinner spinner"></i>送出案件</button>
                    </form>
                </div>
            </div>

            <div id="status-view" class="view">
                <h1>案件追蹤</h1>
                <div class="card filter-bar">
                    <input type="email" id="searchEmail" placeholder="輸入 Email">
                    <select id="statusFilter" onchange="renderStatusView()">
                        <option value="全部">全部狀態</option>
                        <option value="已退回">已退回</option>
                        <option value="待處理">待處理</option>
                        <option value="已解決">已解決</option>
                    </select>
                    <button id="searchBtn" onclick="checkStatus()"><i class="fas fa-spinner spinner"></i>搜尋</button>
                </div>
                <div id="resultArea"></div>
            </div>

            <div id="faq-view" class="view">
                <h1>精選案例庫</h1>
                <div id="faqContent"></div>
            </div>

            <div id="login-view" class="view">
                <h1>管理者驗證</h1>
                <div class="card" style="max-width: 400px; margin: 0 auto;">
                    <input type="password" id="adminPassword" placeholder="輸入密碼">
                    <button onclick="handleAdminLogin()" style="width: 100%; margin-top: 15px;">登入</button>
                </div>
            </div>

            <div id="admin-view" class="view">
                <h1>管理中心</h1>
                <div id="adminContent"></div>
            </div>
        </div>
    </main>

    <div id="toast"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz5i3qIe1lZhsbzw0E6kJF85nef6-xi_cajjwWqS-HqVUYsxE_XA7GjQqOxTm7VVVJbpQ/exec";
        const ADMIN_PASS = "admin123";
        const qlModules = { toolbar: [['bold', 'italic'], [{list:'bullet'}], ['image']] };
        
        var userQuill = new Quill('#editor-user', { theme: 'snow', modules: qlModules });
        let cacheData = [];

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function compressHTML(html) {
            const div = document.createElement('div'); div.innerHTML = html;
            const imgs = div.querySelectorAll('img');
            for (let img of imgs) {
                const src = img.getAttribute('src');
                if (src && src.startsWith('data:image/') && src.length > 5000) {
                    try {
                        const image = await Image.load(src);
                        let resized = image;
                        if (image.width > 600) resized = image.resize({ width: 600 });
                        img.setAttribute('src', resized.toDataURL('image/jpeg', 0.6));
                    } catch (e) { console.warn(e); }
                }
            }
            return div.innerHTML;
        }

        // 提交回報
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.classList.add('loading');
            const content = await compressHTML(userQuill.root.innerHTML);
            const data = { action: "newReport", email: document.getElementById('email').value, type: document.getElementById('type').value, title: document.getElementById('title').value, description: content, sender: "使用者", status: "待處理" };
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            showToast("案件已送出！");
            e.target.reset(); userQuill.setContents([]); btn.classList.remove('loading');
        };

        // 使用者搜尋
        async function checkStatus() {
            const email = document.getElementById('searchEmail').value;
            const btn = document.getElementById('searchBtn');
            if(!email) return showToast("請輸入 Email");
            btn.classList.add('loading');
            const res = await fetch(GAS_URL); cacheData = await res.json();
            btn.classList.remove('loading');
            renderStatusView();
        }

        function renderStatusView() {
            const email = document.getElementById('searchEmail').value.toLowerCase();
            const filter = document.getElementById('statusFilter').value;
            const resArea = document.getElementById('resultArea');
            resArea.innerHTML = "";

            let tickets = {};
            cacheData.slice(1).forEach(row => {
                if(row[2].toLowerCase() !== email) return;
                const id = row[0];
                if(!tickets[id]) tickets[id] = { id: id, email: row[2], type: row[3], title: row[4], status: row[7], messages: [] };
                tickets[id].messages.push({ time: row[1], content: row[5], sender: row[6] });
                tickets[id].status = row[7];
            });

            const statusOrder = { "已退回": 0, "待處理": 1, "已解決": 2 };
            Object.values(tickets).sort((a,b)=>statusOrder[a.status]-statusOrder[b.status]).forEach(ticket => {
                if(filter !== "全部" && ticket.status !== filter) return;
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <div style="display:flex; align-items:center; gap:12px">
                            <span class="status-badge ${ticket.status}">${ticket.status}</span>
                            <span style="font-weight:700">${ticket.title}</span>
                        </div>
                        <i class="fas fa-chevron-down chevron"></i>
                    </div>
                    <div class="collapsible-content">
                        <div class="thread-container">${ticket.messages.map(m=>`
                            <div class="bubble bubble-${m.sender==='管理者'?'admin':'user'}">
                                <span class="bubble-name">${m.sender}</span>
                                <div>${m.content}</div>
                                <span class="bubble-time">${new Date(m.time).toLocaleString()}</span>
                            </div>`).join('')}
                        </div>
                        ${ticket.status === '已退回' ? `
                            <div style="margin-top:20px; border-top:1px dashed #ddd; padding-top:20px">
                                <label>📝 補充說明</label><div id="app-ed-${ticket.id}" class="editor-box"></div>
                                <button id="btn-app-${ticket.id}" onclick="submitAppend('${ticket.id}','${ticket.email}','${ticket.type}','${ticket.title}')"><i class="fas fa-spinner spinner"></i>送出補充</button>
                            </div>` : ''}
                    </div>`;
                resArea.appendChild(card);
                if(ticket.status==='已退回') new Quill(`#app-ed-${ticket.id}`, { theme: 'snow', modules: qlModules });
            });
        }

        async function submitAppend(id, email, type, title) {
            const btn = document.getElementById(`btn-app-${id}`); btn.classList.add('loading');
            const editorHTML = document.querySelector(`#app-ed-${id} .ql-editor`).innerHTML;
            const content = await compressHTML(editorHTML);
            const data = { action: "appendInfo", id: id, email: email, type: type, title: title, description: content, sender: "使用者", status: "待處理" };
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            showToast("補充已送出！");
            checkStatus(); // 刷新並重整 UI
        }

        // 管理員邏輯
        function handleAdminLogin() {
            if(document.getElementById('adminPassword').value === ADMIN_PASS) { showView('admin-view'); loadAdminData(); }
            else showToast("密碼錯誤");
        }

        async function loadAdminData() {
            const area = document.getElementById('adminContent'); area.innerHTML = "載入中...";
            const res = await fetch(GAS_URL); const data = await res.json();
            let tickets = {};
            data.slice(1).forEach(row => {
                const id = row[0];
                if(!tickets[id]) tickets[id] = { id: id, email: row[2], type: row[3], title: row[4], status: row[7], messages: [] };
                tickets[id].messages.push({ time: row[1], content: row[5], sender: row[6] });
                tickets[id].status = row[7];
            });

            area.innerHTML = "";
            Object.values(tickets).reverse().forEach(ticket => {
                const card = document.createElement('div'); card.className = "card";
                card.innerHTML = `
                    <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <div style="display:flex; align-items:center; gap:12px">
                            <span class="status-badge ${ticket.status}">${ticket.status}</span>
                            <span style="font-weight:700">${ticket.title} (${ticket.email})</span>
                        </div>
                        <i class="fas fa-chevron-down chevron"></i>
                    </div>
                    <div class="collapsible-content">
                        <div class="thread-container">${ticket.messages.map(m=>`<div class="bubble bubble-${m.sender==='管理者'?'admin':'user'}"><b>${m.sender}:</b><div>${m.content}</div></div>`).join('')}</div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px">
                            <div><label>案件狀態</label><select id="st-${ticket.id}"><option value="待處理" ${ticket.status=='待處理'?'selected':''}>待處理</option><option value="已解決" ${ticket.status=='已解決'?'selected':''}>已解決</option><option value="已退回" ${ticket.status=='已退回'?'selected':''}>已退回</option></select></div>
                            <div><label>精選分類</label><input type="text" id="cat-${ticket.id}" value="${ticket.type}"></div>
                        </div>
                        <label>回覆內容</label><div id="adm-ed-${ticket.id}" class="editor-box"></div>
                        <button id="btn-adm-${ticket.id}" onclick="saveAdminReply('${ticket.id}','${ticket.email}','${ticket.title}')" style="width:100%"><i class="fas fa-spinner spinner"></i>送出回覆</button>
                    </div>`;
                area.appendChild(card);
                new Quill(`#adm-ed-${ticket.id}`, { theme: 'snow', modules: qlModules });
            });
        }

        async function saveAdminReply(id, email, title) {
            const btn = document.getElementById(`btn-adm-${id}`); btn.classList.add('loading');
            const content = await compressHTML(document.querySelector(`#adm-ed-${id} .ql-editor`).innerHTML);
            const status = document.getElementById(`st-${id}`).value;
            const cat = document.getElementById(`cat-${id}`).value;
            const data = { action: "updateReply", id: id, email: email, type: cat, title: title, description: content, sender: "管理者", status: status };
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            showToast("回覆已成功！");
            loadAdminData();
        }
    </script>
</body>
</html>
