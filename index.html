<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBP 回報中心</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.lactame.com/lib/image-js/0.31.0/image.min.js"></script>
    <style>
        :root { 
            --primary: #6366f1; /* Indigo */
            --secondary: #06b6d4; /* Cyan */
            --amber: #f59e0b;
            --bg: #fdfaf7; 
            --sidebar: #ffffff; 
            --card: #ffffff; 
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', "Microsoft JhengHei", sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: #1e293b; overflow: hidden; }
        
        /* 導覽列優化 */
        nav { width: 280px; background: var(--sidebar); border-right: 1px solid #f1f5f9; display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.6rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; display: flex; align-items: center; gap: 12px; }
        .nav-item { padding: 14px 18px; border-radius: 16px; cursor: pointer; color: #64748b; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: #eef2ff; color: var(--primary); }
        .nav-footer { margin-top: auto; border-top: 1px solid #f1f5f9; padding-top: 20px; }

        /* 主區域 */
        main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 850px; }
        
        /* 專業卡片設計 - 去除舊硬邊框 */
        .card { 
            background: white; 
            border-radius: 24px; 
            padding: 30px; 
            border: 1px solid #f1f5f9; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            margin-bottom: 25px; 
        }

        /* 👑 修正重點：管理者驗證介面 */
        .login-card {
            border: 2px solid #fef3c7; /* Amber Orange 淺框 */
            box-shadow: 0 20px 25px rgba(0,0,0,0.05);
            max-width: 450px;
            margin: 100px auto;
        }
        
        /* 👑 修正重點：輸入框現代化 */
        input[type="password"] {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            background: #f1f5f9; /* 淺灰色底 */
            color: #1e293b;
            margin: 20px 0;
            transition: 0.2s;
            outline: none;
        }
        input[type="password"]:focus {
            box-shadow: 0 0 0 4px #e0e7ff; /* Indigo focus 呼吸光 */
        }
        
        /* 其他輸入框 */
        input[type="email"], input[type="text"], select { 
            width: 100%; 
            padding: 12px 16px; 
            border: 1.5px solid #f1f5f9; 
            border-radius: 12px; 
            font-size: 1rem; 
            background: #fff;
        }

        /* 按鈕風格一致化 */
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 16px 30px; 
            border-radius: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            justify-content: center;
        }
        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 15px rgba(99,102,241,0.3);
        }
        button:active { transform: translateY(0); }
        
        .spinner { display: none; animation: spin 1s linear infinite; }
        .loading .spinner { display: inline-block; }
        @keyframes spin { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }

        #toast { position: fixed; top: 24px; right: 24px; background: #1e293b; color: white; padding: 16px 32px; border-radius: 16px; display: none; z-index: 1000; box-shadow: 0 20px 25px rgba(0,0,0,0.2); }
        .view { display: none; width: 100%; }
        .view.active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-paper-plane"></i> BBP 回報中心</div>
        <div class="nav-item active" onclick="showView('report-view', this)"><i class="fas fa-plus-circle"></i> 新增回報案件</div>
        <div class="nav-item" onclick="showView('status-view', this)"><i class="fas fa-history"></i> 我的案件進度</div>
        <div class="nav-footer">
            <div class="nav-item" onclick="showView('login-view', this)"><i class="fas fa-user-shield"></i> 管理登入</div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div id="login-view" class="view">
                <h1>管理者後台</h1>
                <div class="card login-card">
                    <h2 style="margin-top:0; text-align:center;">身分驗證</h2>
                    <p style="text-align:center; color:#64748b; margin-bottom:30px;">請輸入您的金鑰以進入管理中心</p>
                    <input type="password" id="adminPassword" placeholder="輸入管理金鑰">
                    <button onclick="handleAdminLogin()" style="width: 100%;">進入後台系統</button>
                </div>
            </div>
            
            </div>
    </main>

    <div id="toast"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // 後續 Script 邏輯保持不變
    </script>
</body>
</html>
