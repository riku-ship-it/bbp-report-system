<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBP 系統儀表板</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.lactame.com/lib/image-js/0.31.0/image.min.js"></script>
    <style>
        :root { --primary: #6366f1; --secondary: #06b6d4; --bg: #f8fafc; --sidebar: #ffffff; --card: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', "Microsoft JhengHei", sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: #1e293b; overflow: hidden; }
        
        /* 側邊欄 */
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid #f1f5f9; display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; color: #64748b; margin-bottom: 5px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: #f1f5f9; color: var(--primary); }
        .nav-footer { margin-top: auto; border-top: 1px solid #f1f5f9; padding-top: 20px; }

        /* 主區域 */
        main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        
        /* Dashboard 數據卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-card h3 { margin: 0; font-size: 0.9rem; color: #64748b; font-weight: 600; }
        .stat-card .value { font-size: 2.2rem; font-weight: 800; margin-top: 10px; display: block; }
        .stat-card .desc { font-size: 0.8rem; color: #94a3b8; margin-top: 5px; }

        /* 列表與區塊 */
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { font-size: 1.25rem; font-weight: 800; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 25px; border: 1px solid #f1f5f9; box-shadow: 0 10px 15px rgba(0,0,0,0.03); margin-bottom: 20px; }
        
        /* 優先序標籤 */
        .priority-badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; margin-right: 8px; }
        .p-1 { background: #fee2e2; color: #ef4444; } /* 緊急 */
        .p-2 { background: #fef3c7; color: #f59e0b; } /* 優先 */
        .p-3 { background: #dcfce7; color: #10b981; } /* 一般 */

        /* 對話與收合 */
        .collapsible-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .collapsible-content { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #f1f5f9; }
        .card.expanded .collapsible-content { display: block; }

        .bubble { padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; max-width: 85%; font-size: 0.95rem; }
        .bubble-user { background: #f8fafc; border: 1px solid #f1f5f9; }
        .bubble-admin { background: #eef2ff; border-left: 4px solid var(--primary); margin-left: auto; }

        .ql-editor img { max-width: 100%; border-radius: 8px; margin: 10px 0; }
        .editor-box { height: 180px; margin-bottom: 10px; }
        
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        button:hover { filter: brightness(1.1); }
        button.loading { opacity: 0.6; pointer-events: none; }
        .spinner { display: none; animation: spin 1s linear infinite; }
        .loading .spinner { display: inline-block; }
        @keyframes spin { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }

        #toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; color: white; padding: 16px 24px; border-radius: 12px; display: none; z-index: 1000; }
        .view { display: none; width: 100%; }
        .view.active { display: block; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-rocket"></i> BBP Dashboard</div>
        <div class="nav-item active" onclick="showView('dash-view', this)"><i class="fas fa-chart-pie"></i> 總覽儀表板</div>
        <div class="nav-item" onclick="showView('report-view', this)"><i class="fas fa-plus-circle"></i> 新增案件回報</div>
        <div class="nav-item" onclick="showView('status-view', this)"><i class="fas fa-search"></i> 案件進度查詢</div>
        <div class="nav-footer">
            <div class="nav-item" onclick="showView('login-view', this)"><i class="fas fa-user-shield"></i> 管理者模式</div>
        </div>
    </nav>

    <main>
        <div class="container">
            
            <div id="dash-view" class="view active">
                <div class="section-header">
                    <h2>系統營運概況</h2>
                    <div id="current-cycle-tag" style="font-size: 0.8rem; color: #64748b; background: #fff; padding: 5px 12px; border-radius: 50px; border: 1px solid #f1f5f9;"></div>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>當前負載</h3>
                        <span class="value" id="stat-pending">-</span>
                        <span class="desc">所有待處理的案件總數</span>
                    </div>
                    <div class="stat-card">
                        <h3>本週進度</h3>
                        <span class="value" id="stat-resolved" style="color: #10b981;">-</span>
                        <span class="desc">本週期內已解決的案件</span>
                    </div>
                    <div class="stat-card">
                        <h3>處理效率</h3>
                        <span class="value" id="stat-rate" style="color: var(--primary);">-</span>
                        <span class="desc">本週解決率 (解決/總計)</span>
                    </div>
                </div>

                <div class="section-header">
                    <h2>急件關注列表</h2>
                </div>
                <div id="priority-list"></div>
            </div>

            <div id="report-view" class="view">
                <h2 style="margin-bottom:20px">建立新案件</h2>
                <div class="card">
                    <form id="reportForm">
                        <label style="font-size:0.85rem; font-weight:700">聯絡 Email</label>
                        <input type="email" id="email" style="width:100%; padding:12px; margin:8px 0 20px; border:1px solid #f1f5f9; border-radius:10px;" required>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div>
                                <label style="font-size:0.85rem; font-weight:700">案件類別</label>
                                <select id="type" style="width:100%; padding:12px; margin-top:8px; border:1px solid #f1f5f9; border-radius:10px;">
                                    <option>BUG 回報</option>
                                    <option>功能建議</option>
                                    <option>其他諮詢</option>
                                </select>
                            </div>
                            <div>
                                <label style="font-size:0.85rem; font-weight:700">案件標題</label>
                                <input type="text" id="title" style="width:100%; padding:12px; margin-top:8px; border:1px solid #f1f5f9; border-radius:10px;" required>
                            </div>
                        </div>

                        <label style="display:block; margin:20px 0 8px; font-size:0.85rem; font-weight:700">詳細描述與圖片</label>
                        <div id="editor-user" class="editor-box"></div>
                        <button type="submit" id="submitBtn" style="width:100%; margin-top:15px;"><i class="fas fa-spinner spinner"></i> 提交案件</button>
                    </form>
                </div>
            </div>

            <div id="status-view" class="view">
                <h2>案件追蹤進度</h2>
                <div class="card" style="display:flex; gap:10px; align-items:center;">
                    <input type="email" id="searchEmail" placeholder="輸入您的 Email" style="flex:1; padding:12px; border:1px solid #f1f5f9; border-radius:10px;">
                    <button id="searchBtn" onclick="refreshData(true)"><i class="fas fa-search"></i> 搜尋</button>
                </div>
                <div id="user-result-list"></div>
            </div>

            <div id="admin-view" class="view">
                <h2>管理員中心</h2>
                <div id="admin-list"></div>
            </div>

            <div id="login-view" class="view">
                <div class="card" style="max-width:400px; margin: 100px auto; text-align:center;">
                    <h2>管理者驗證</h2>
                    <input type="password" id="adminPassword" placeholder="請輸入密碼" style="width:100%; padding:12px; margin:20px 0; border:1px solid #f1f5f9; border-radius:10px;">
                    <button onclick="checkAdminLogin()" style="width:100%">進入後台</button>
                </div>
            </div>

        </div>
    </main>

    <div id="toast"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz5i3qIe1lZhsbzw0E6kJF85nef6-xi_cajjwWqS-HqVUYsxE_XA7GjQqOxTm7VVVJbpQ/exec";
        const qlModules = { toolbar: [['bold', 'italic'], [{list:'bullet'}], ['image']] };
        let fullData = [];

        var userQuill = new Quill('#editor-user', { theme: 'snow', modules: qlModules });

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id === 'dash-view') refreshData();
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        // 自動判斷目前的 Cycle ID
        function calculateCurrentCycle() {
            const now = new Date();
            const day = now.getDay();
            const hour = now.getHours();
            let base = new Date(now);
            if (day < 3 || (day === 3 && hour < 16)) {
                base.setDate(now.getDate() - (day + 4) % 7);
            } else {
                base.setDate(now.getDate() - (day - 3));
            }
            const y = base.getFullYear();
            const w = getWeekNumber(base);
            return `${y}-W${w < 10 ? '0' + w : w}`;
        }

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return weekNo;
        }

        async function refreshData(isSearch = false) {
            const res = await fetch(GAS_URL);
            fullData = await res.json();
            renderDashboard();
            if(isSearch) renderUserStatus();
            if(document.getElementById('admin-view').classList.contains('active')) renderAdminList();
        }

        function renderDashboard() {
            const currentCycle = calculateCurrentCycle();
            document.getElementById('current-cycle-tag').innerText = `目前週期: ${currentCycle}`;
            
            let tickets = {};
            fullData.slice(1).forEach(row => {
                const id = row[0];
                if(!tickets[id]) tickets[id] = { id, status: row[7], priority: row[9], cycle: row[10], title: row[4] };
                tickets[id].status = row[7];
                tickets[id].priority = row[9];
                tickets[id].cycle = row[10];
            });

            const ticketArr = Object.values(tickets);
            const pending = ticketArr.filter(t => t.status === '待處理').length;
            const resolvedThisWeek = ticketArr.filter(t => t.status === '已解決' && t.cycle === currentCycle).length;
            const rate = ticketArr.length > 0 ? Math.round((resolvedThisWeek / ticketArr.length) * 100) : 0;

            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-resolved').innerText = resolvedThisWeek;
            document.getElementById('stat-rate').innerText = rate + '%';

            // 渲染優先序列表 (只顯示待處理中優先級最高的)
            const prioList = document.getElementById('priority-list');
            prioList.innerHTML = "";
            ticketArr.filter(t => t.status === '待處理').sort((a,b) => a.priority.localeCompare(b.priority)).slice(0, 5).forEach(t => {
                const pClass = t.priority.includes('1') ? 'p-1' : (t.priority.includes('2') ? 'p-2' : 'p-3');
                prioList.innerHTML += `
                    <div class="card" style="padding:15px 20px; display:flex; align-items:center; justify-content:space-between;">
                        <div>
                            <span class="priority-badge ${pClass}">${t.priority.split('-')[1]}</span>
                            <span style="font-weight:700">${t.title}</span>
                        </div>
                        <small style="color:#94a3b8">ID: ${t.id.substring(0,8)}</small>
                    </div>`;
            });
        }

        async function compressHTML(html) {
            const div = document.createElement('div'); div.innerHTML = html;
            const imgs = div.querySelectorAll('img');
            for (let img of imgs) {
                const src = img.getAttribute('src');
                if (src && src.startsWith('data:image/') && src.length > 5000) {
                    try {
                        const image = await Image.load(src);
                        let resized = image;
                        if (image.width > 600) resized = image.resize({ width: 600 });
                        img.setAttribute('src', resized.toDataURL('image/jpeg', 0.6));
                    } catch (e) { console.warn(e); }
                }
            }
            return div.innerHTML;
        }

        // 提交回報
        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.classList.add('loading');
            const content = await compressHTML(userQuill.root.innerHTML);
            const data = { 
                email: document.getElementById('email').value, 
                type: document.getElementById('type').value, 
                title: document.getElementById('title').value, 
                description: content,
                priority: "2-優先"
            };
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            showToast("案件已成功建立！");
            e.target.reset(); userQuill.setContents([]); btn.classList.remove('loading');
            showView('dash-view');
        };

        function renderUserStatus() {
            const email = document.getElementById('searchEmail').value.toLowerCase();
            const area = document.getElementById('user-result-list');
            area.innerHTML = "";
            
            let tickets = {};
            fullData.slice(1).forEach(row => {
                if(row[2].toLowerCase() !== email) return;
                const id = row[0];
                if(!tickets[id]) tickets[id] = { id, title: row[4], status: row[7], messages: [] };
                tickets[id].messages.push({ sender: row[6], content: row[5], time: row[1] });
                tickets[id].status = row[7];
            });

            Object.values(tickets).reverse().forEach(t => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <span style="font-weight:700">${t.title} <small style="margin-left:10px; color:#94a3b8; font-weight:400;">${t.status}</small></span>
                        <i class="fas fa-chevron-down" style="font-size:0.8rem; color:#cbd5e1"></i>
                    </div>
                    <div class="collapsible-content">
                        ${t.messages.map(m => `<div class="bubble bubble-${m.sender==='管理者'?'admin':'user'}"><b>${m.sender}:</b> <div>${m.content}</div></div>`).join('')}
                    </div>`;
                area.appendChild(card);
            });
        }

        function checkAdminLogin() {
            if(document.getElementById('adminPassword').value === 'admin123') {
                showView('admin-view');
                renderAdminList();
            } else showToast("密碼錯誤");
        }

        function renderAdminList() {
            const area = document.getElementById('admin-list');
            area.innerHTML = "";
            let tickets = {};
            fullData.slice(1).forEach(row => {
                const id = row[0];
                if(!tickets[id]) tickets[id] = { id, email: row[2], title: row[4], status: row[7], priority: row[9], messages: [] };
                tickets[id].messages.push({ sender: row[6], content: row[5] });
                tickets[id].status = row[7];
                tickets[id].priority = row[9];
            });

            Object.values(tickets).reverse().forEach(t => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <span style="font-weight:700">${t.title} (${t.email})</span>
                        <div style="display:flex; gap:10px; align-items:center">
                            <span class="priority-badge p-2">${t.priority}</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="collapsible-content">
                        <div style="display:flex; gap:15px; margin-bottom:15px">
                            <select id="st-${t.id}" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
                                <option value="待處理" ${t.status=='待處理'?'selected':''}>待處理</option>
                                <option value="已解決" ${t.status=='已解決'?'selected':''}>已解決</option>
                                <option value="已退回" ${t.status=='已退回'?'selected':''}>已退回</option>
                            </select>
                            <select id="pr-${t.id}" style="padding:8px; border-radius:8px; border:1px solid #ddd;">
                                <option value="1-緊急" ${t.priority=='1-緊急'?'selected':''}>1-緊急</option>
                                <option value="2-優先" ${t.priority=='2-優先'?'selected':''}>2-優先</option>
                                <option value="3-一般" ${t.priority=='3-一般'?'selected':''}>3-一般</option>
                            </select>
                        </div>
                        <div id="adm-ed-${t.id}" class="editor-box"></div>
                        <button onclick="adminReply('${t.id}', '${t.email}', '${t.title}')" id="btn-adm-${t.id}" style="width:100%"><i class="fas fa-spinner spinner"></i> 送出回覆並更新</button>
                    </div>`;
                area.appendChild(card);
                new Quill(`#adm-ed-${t.id}`, { theme: 'snow', modules: qlModules });
            });
        }

        async function adminReply(id, email, title) {
            const btn = document.getElementById(`btn-adm-${id}`); btn.classList.add('loading');
            const content = await compressHTML(document.querySelector(`#adm-ed-${id} .ql-editor`).innerHTML);
            const status = document.getElementById(`st-${id}`).value;
            const priority = document.getElementById(`pr-${id}`).value;
            const data = { id, email, title, description: content, status, priority, sender: "管理者" };
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            showToast("回覆已成功！");
            refreshData();
        }

        // 初始化載入
        window.onload = refreshData;

    </script>
</body>
</html>
