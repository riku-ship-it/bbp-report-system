<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBP Feedback System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --sidebar: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
        }
        * { box-sizing: border-box; font-family: 'Inter', "Microsoft JhengHei", sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background-color: var(--bg); color: var(--text-main); }

        /* 左側導覽列 */
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid #e2e8f0; display: flex; flex-direction: column; padding: 20px; }
        .logo { font-weight: 700; font-size: 1.2rem; color: var(--primary); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 15px; border-radius: 8px; cursor: pointer; color: var(--text-sub); margin-bottom: 5px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .nav-item:hover, .nav-item.active { background: #f1f5f9; color: var(--primary); font-weight: 600; }

        /* 右側主區域 */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; border-radius: 16px; padding: 30px; border: 1px solid #f1f5f9; box-shadow: 0 4px 15px rgba(0,0,0,0.02); max-width: 800px; }
        
        /* 表單樣式 */
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 8px; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 1rem; transition: 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .file-upload { border: 2px dashed #e2e8f0; padding: 20px; text-align: center; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .file-upload:hover { border-color: var(--primary); background: #f8fafc; }

        button { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }

        /* 查詢結果卡片 */
        .report-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #f1f5f9; }
        .status-tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; background: #e0e7ff; color: #4338ca; }
        .admin-reply { margin-top: 15px; padding: 15px; background: #f8fafc; border-radius: 10px; border-left: 4px solid var(--primary); }

        /* 隱藏/顯示控制 */
        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-rocket"></i> BBP Agent</div>
        <div class="nav-item active" onclick="switchView('report-view', this)"><i class="fas fa-plus-circle"></i> 新增回報</div>
        <div class="nav-item" onclick="switchView('status-view', this)"><i class="fas fa-search"></i> 回饋追蹤</div>
    </nav>

    <main>
        <div id="report-view" class="view active">
            <div class="header"><h1>建立新案件</h1></div>
            <div class="card">
                <form id="reportForm">
                    <div class="form-group">
                        <label>聯絡 Email</label>
                        <input type="email" id="email" placeholder="我們將以此辨認您的身分" required>
                    </div>
                    <div class="form-group">
                        <label>回報類別</label>
                        <select id="type">
                            <option value="BUG">🐛 Bug 回報</option>
                            <option value="建議">💡 功能建議</option>
                            <option value="問題">❓ 一般問題</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>案件標題</label>
                        <input type="text" id="title" required>
                    </div>
                    <div class="form-group">
                        <label>詳情描述</label>
                        <textarea id="description" rows="5"></textarea>
                    </div>
                    <div class="form-group">
                        <label>附件上傳 (圖片/影片)</label>
                        <div class="file-upload" onclick="document.getElementById('imageFile').click()">
                            <i class="fas fa-cloud-upload-alt"></i> 點擊選取檔案
                        </div>
                        <input type="file" id="imageFile" style="display:none" accept="image/*,video/*">
                    </div>
                    <button type="submit" id="submitBtn">提交回報</button>
                </form>
            </div>
        </div>

        <div id="status-view" class="view">
            <div class="header"><h1>追蹤進度</h1></div>
            <div class="card" style="max-width: 100%;">
                <div class="form-group" style="display: flex; gap: 10px;">
                    <input type="email" id="searchEmail" placeholder="請輸入回報時的 Email">
                    <button onclick="checkStatus()" style="width: auto; margin-top: 0; padding: 0 30px;">搜尋</button>
                </div>
                <div id="resultArea"></div>
            </div>
        </div>
    </main>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz5i3qIe1lZhsbzw0E6kJF85nef6-xi_cajjwWqS-HqVUYsxE_XA7GjQqOxTm7VVVJbpQ/exec";

        function switchView(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "正在傳送...";
            btn.disabled = true;

            const data = {
                email: document.getElementById('email').value,
                type: document.getElementById('type').value,
                title: document.getElementById('title').value,
                description: document.getElementById('description').value
            };

            try {
                await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
                alert("回報已成功送出！");
                e.target.reset();
            } catch (err) { alert("發生錯誤，請再試一次"); }
            btn.innerText = "提交回報";
            btn.disabled = false;
        };

        async function checkStatus() {
            const email = document.getElementById('searchEmail').value;
            const resArea = document.getElementById('resultArea');
            if(!email) return;

            resArea.innerHTML = "<p>搜尋中...</p>";

            try {
                const response = await fetch(`${GAS_URL}?email=${email}`);
                const data = await response.json();
                
                if (data.length <= 1) {
                    resArea.innerHTML = "<p>找不到記錄。</p>";
                    return;
                }

                let html = "";
                data.forEach((row, index) => {
                    if(index === 0) return;
                    html += `
                        <div class="report-card">
                            <span class="status-tag">${row[9] || '處理中'}</span>
                            <h3 style="margin: 10px 0;">${row[4]}</h3>
                            <p style="color:var(--text-sub); font-size:0.9rem;">${row[5]}</p>
                            <div class="admin-reply">
                                <strong>管理者回饋：</strong>
                                <p style="margin-bottom:0;">${row[8] || '尚未回覆'}</p>
                            </div>
                        </div>
                    `;
                });
                resArea.innerHTML = html;
            } catch (err) { resArea.innerHTML = "<p>查詢失敗。</p>"; }
        }
    </script>
</body>
</html>
