<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBP 系統儀表板</title>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://www.lactame.com/lib/image-js/0.31.0/image.min.js"></script>
    <style>
        :root { --primary: #6366f1; --secondary: #06b6d4; --bg: #f8fafc; --sidebar: #ffffff; }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', "Microsoft JhengHei", sans-serif; }
        body { margin: 0; display: flex; height: 100vh; background: var(--bg); color: #1e293b; overflow: hidden; }
        
        nav { width: 260px; background: var(--sidebar); border-right: 1px solid #f1f5f9; display: flex; flex-direction: column; padding: 30px 20px; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-item { padding: 12px 16px; border-radius: 12px; cursor: pointer; color: #64748b; margin-bottom: 5px; transition: 0.3s; display: flex; align-items: center; gap: 12px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: #f1f5f9; color: var(--primary); }

        main { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 900px; }
        
        /* Dashboard 數據卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 25px; border-radius: 24px; border: 1px solid #f1f5f9; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .stat-card h3 { margin: 0; font-size: 0.85rem; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-card .value { font-size: 2.5rem; font-weight: 800; margin-top: 10px; display: block; color: #1e293b; }

        .card { background: white; border-radius: 20px; padding: 20px; border: 1px solid #f1f5f9; box-shadow: 0 10px 15px rgba(0,0,0,0.03); margin-bottom: 15px; }
        
        /* 優先序標籤 */
        .priority-badge { padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; }
        .p-1 { background: #fee2e2; color: #ef4444; } 
        .p-2 { background: #fef3c7; color: #f59e0b; } 
        .p-3 { background: #dcfce7; color: #10b981; } 

        /* 內容樣式 */
        .collapsible-header { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .collapsible-content { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px solid #f8fafc; }
        .card.expanded .collapsible-content { display: block; }
        .bubble { padding: 12px 16px; border-radius: 12px; margin-bottom: 10px; max-width: 90%; font-size: 0.9rem; }
        .bubble-user { background: #f8fafc; border: 1px solid #f1f5f9; }
        .bubble-admin { background: #eff6ff; border-left: 4px solid var(--primary); margin-left: auto; }

        .editor-box { height: 180px; margin-bottom: 10px; background: #fff; }
        input, select { width: 100%; padding: 12px; border: 1px solid #f1f5f9; border-radius: 10px; margin-top: 5px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 8px; justify-content: center; }
        button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.2); }
        .spinner { display: none; animation: spin 1s linear infinite; }
        .loading .spinner { display: inline-block; }
        @keyframes spin { from {transform:rotate(0deg);} to {transform:rotate(360deg);} }

        #toast { position: fixed; bottom: 30px; right: 30px; background: #1e293b; color: white; padding: 16px 24px; border-radius: 12px; display: none; z-index: 1000; }
        .view { display: none; width: 100%; }
        .view.active { display: block; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-rocket"></i> BBP Dashboard</div>
        <div class="nav-item active" onclick="showView('dash-view', this)"><i class="fas fa-chart-pie"></i> 總覽儀表板</div>
        <div class="nav-item" onclick="showView('report-view', this)"><i class="fas fa-plus-circle"></i> 新增案件回報</div>
        <div class="nav-item" onclick="showView('status-view', this)"><i class="fas fa-search"></i> 案件進度查詢</div>
        <div class="nav-footer">
            <div class="nav-item" onclick="showView('login-view', this)"><i class="fas fa-user-shield"></i> 管理者模式</div>
        </div>
    </nav>

    <main>
        <div class="container">
            
            <div id="dash-view" class="view active">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <h2 style="margin:0">營運數據概況</h2>
                    <span id="cycle-display" style="font-size:0.8rem; font-weight:700; color:#64748b; background:#fff; padding:6px 14px; border-radius:50px; border:1px solid #f1f5f9;">載入中...</span>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-card"><h3>當前負載 (待處理)</h3><span class="value" id="stat-pending">0</span></div>
                    <div class="stat-card"><h3>本週進度 (已解決)</h3><span class="value" id="stat-resolved" style="color:#10b981;">0</span></div>
                    <div class="stat-card"><h3>本週結案率</h3><span class="value" id="stat-rate" style="color:var(--primary);">0%</span></div>
                </div>

                <h2 style="margin-bottom:20px; font-size:1.1rem;">🔥 急件關注列表</h2>
                <div id="priority-list"></div>
            </div>

            <div id="report-view" class="view">
                <h2>建立新案件</h2>
                <div class="card">
                    <form id="reportForm">
                        <label>聯絡 Email</label><input type="email" id="email" required>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin: 15px 0;">
                            <div><label>案件分類</label><select id="type"><option>BUG 回報</option><option>功能建議</option></select></div>
                            <div><label>案件標題</label><input type="text" id="title" required></div>
                        </div>
                        <label>詳細描述</label><div id="editor-user" class="editor-box"></div>
                        <button type="submit" id="submitBtn" style="width:100%; margin-top:10px;"><i class="fas fa-spinner spinner"></i> 提交案件</button>
                    </form>
                </div>
            </div>

            <div id="status-view" class="view">
                <h2>案件進度查詢</h2>
                <div class="card" style="display:flex; gap:10px;">
                    <input type="email" id="searchEmail" placeholder="請輸入回報時的 Email" style="flex:1; margin:0">
                    <button id="searchBtn" onclick="searchUserTickets()"><i class="fas fa-spinner spinner"></i> 搜尋</button>
                </div>
                <div id="user-result-list"></div>
            </div>

            <div id="login-view" class="view">
                <div class="card" style="max-width:400px; margin: 80px auto; text-align:center;">
                    <h2 style="margin-top:0">管理者登入</h2>
                    <input type="password" id="adminPassword" placeholder="請輸入金鑰" style="margin-bottom:20px">
                    <button onclick="checkAdminLogin()" style="width:100%">進入後台</button>
                </div>
            </div>

            <div id="admin-view" class="view">
                <h2>管理者中心</h2>
                <div id="admin-list"></div>
            </div>

        </div>
    </main>

    <div id="toast"></div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbz5i3qIe1lZhsbzw0E6kJF85nef6-xi_cajjwWqS-HqVUYsxE_XA7GjQqOxTm7VVVJbpQ/exec";
        const qlModules = { toolbar: [['bold', 'italic'], [{list:'bullet'}], ['image']] };
        let allData = [];

        var userQuill = new Quill('#editor-user', { theme: 'snow', modules: qlModules });

        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
            if(id === 'dash-view') fetchData();
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); t.innerText = msg; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function fetchData() {
            try {
                const res = await fetch(GAS_URL);
                allData = await res.json();
                renderDashboard();
            } catch (e) { showToast("連線失敗，請檢查 GAS 權限"); }
        }

        function renderDashboard() {
            if (allData.length < 2) return;
            
            let tickets = {};
            let latestCycle = allData[allData.length-1][10]; // 取得最新週期編號
            document.getElementById('cycle-display').innerText = "本報表週期: " + latestCycle;

            allData.slice(1).forEach(row => {
                const id = row[0];
                if(!tickets[id]) tickets[id] = { id, title:row[4], status:row[7], priority:row[9], cycle:row[10] };
                tickets[id].status = row[7];
                tickets[id].priority = row[9];
                tickets[id].cycle = row[10];
            });

            const ticketList = Object.values(tickets);
            const pending = ticketList.filter(t => t.status === '待處理').length;
            const resolved = ticketList.filter(t => t.status === '已解決' && t.cycle === latestCycle).length;
            const totalThisCycle = ticketList.filter(t => t.cycle === latestCycle).length;
            const rate = totalThisCycle > 0 ? Math.round((resolved / totalThisCycle) * 100) : 0;

            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-resolved').innerText = resolved;
            document.getElementById('stat-rate').innerText = rate + "%";

            const listArea = document.getElementById('priority-list');
            listArea.innerHTML = "";
            ticketList.filter(t => t.status === '待處理').sort((a,b) => String(a.priority).localeCompare(String(b.priority))).slice(0, 5).forEach(t => {
                const pClass = String(t.priority).includes('1') ? 'p-1' : (String(t.priority).includes('2') ? 'p-2' : 'p-3');
                listArea.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:15px 25px;">
                    <div><span class="priority-badge ${pClass}">${t.priority || '2-優先'}</span> <b style="margin-left:10px">${t.title}</b></div>
                    <i class="fas fa-chevron-right" style="color:#cbd5e1"></i>
                </div>`;
            });
        }

        async function compressHTML(html) {
            const div = document.createElement('div'); div.innerHTML = html;
            const imgs = div.querySelectorAll('img');
            for (let img of imgs) {
                const src = img.getAttribute('src');
                if (src && src.startsWith('data:image/') && src.length > 5000) {
                    try {
                        const image = await Image.load(src);
                        let resized = image;
                        if (image.width > 600) resized = image.resize({ width: 600 });
                        img.setAttribute('src', resized.toDataURL('image/jpeg', 0.6));
                    } catch (e) { console.warn(e); }
                }
            }
            return div.innerHTML;
        }

        document.getElementById('reportForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'); btn.classList.add('loading');
            const content = await compressHTML(userQuill.root.innerHTML);
            const data = { 
                email: document.getElementById('email').value.trim(), 
                type: document.getElementById('type').value, 
                title: document.getElementById('title').value.trim(), 
                description: content
            };
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            showToast("提交成功！");
            btn.classList.remove('loading');
            e.target.reset(); userQuill.setContents([]);
            fetchData(); showView('dash-view', document.getElementById('nav-dash'));
        };

        async function searchUserTickets() {
            const email = document.getElementById('searchEmail').value.trim().toLowerCase();
            const btn = document.getElementById('searchBtn');
            if(!email) return showToast("請輸入 Email");
            btn.classList.add('loading');
            await fetchData();
            btn.classList.remove('loading');

            const area = document.getElementById('user-result-list');
            area.innerHTML = "";
            let tickets = {};
            allData.slice(1).forEach(row => {
                if(String(row[2]).toLowerCase().trim() !== email) return;
                const id = row[0];
                if(!tickets[id]) tickets[id] = { title: row[4], status: row[7], msgs: [] };
                tickets[id].msgs.push({ sender: row[6], content: row[5] });
                tickets[id].status = row[7];
            });

            Object.values(tickets).reverse().forEach(t => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <b>${t.title} <small style="margin-left:10px; color:var(--primary)">[${t.status}]</small></b><i class="fas fa-chevron-down"></i></div>
                    <div class="collapsible-content">${t.msgs.map(m=>`<div class="bubble bubble-${m.sender==='管理者'?'admin':'user'}"><b>${m.sender}:</b> ${m.content}</div>`).join('')}</div>`;
                area.appendChild(card);
            });
            if(area.innerHTML === "") area.innerHTML = "<p style='text-align:center; color:#94a3b8; margin-top:20px;'>找不到相關案件</p>";
        }

        function checkAdminLogin() {
            if(document.getElementById('adminPassword').value === 'admin123') {
                showView('admin-view'); renderAdmin();
            } else showToast("密碼錯誤");
        }

        function renderAdmin() {
            const area = document.getElementById('admin-list');
            area.innerHTML = "";
            let tickets = {};
            allData.slice(1).forEach(row => {
                const id = row[0];
                if(!tickets[id]) tickets[id] = { id, email:row[2], title:row[4], status:row[7], priority:row[9], msgs: [] };
                tickets[id].msgs.push({ sender: row[6], content: row[5] });
                tickets[id].status = row[7];
                tickets[id].priority = row[9];
            });

            Object.values(tickets).reverse().forEach(t => {
                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `<div class="collapsible-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <b>${t.title} (${t.email})</b> <span class="priority-badge p-2">${t.priority || '2-優先'}</span></div>
                    <div class="collapsible-content">
                        <div style="margin-bottom:15px; background:#f8fafc; padding:15px; border-radius:10px;">
                            ${t.msgs.map(m=>`<div><b>${m.sender}:</b> ${m.content}</div>`).join('')}
                        </div>
                        <div style="display:flex; gap:10px; margin-bottom:15px">
                            <select id="st-${t.id}"><option value="待處理" ${t.status=='待處理'?'selected':''}>待處理</option><option value="已解決" ${t.status=='已解決'?'selected':''}>已解決</option><option value="已退回" ${t.status=='已退回'?'selected':''}>已退回</option></select>
                            <select id="pr-${t.id}"><option value="1-緊急" ${t.priority=='1-緊急'?'selected':''}>1-緊急</option><option value="2-優先" ${t.priority=='2-優先'?'selected':''}>2-優先</option><option value="3-一般" ${t.priority=='3-一般'?'selected':''}>3-一般</option></select>
                        </div>
                        <div id="ed-${t.id}" class="editor-box"></div>
                        <button id="btn-${t.id}" onclick="adminReply('${t.id}','${t.email}','${t.title}')" style="width:100%"><i class="fas fa-spinner spinner"></i> 送出回覆並存檔</button>
                    </div>`;
                area.appendChild(card);
                new Quill(`#ed-${t.id}`, { theme: 'snow', modules: qlModules });
            });
        }

        async function adminReply(id, email, title) {
            const btn = document.getElementById('btn-'+id); btn.classList.add('loading');
            const content = await compressHTML(document.querySelector(`#ed-${id} .ql-editor`).innerHTML);
            const data = { id, email, title, description: content, status: document.getElementById('st-'+id).value, priority: document.getElementById('pr-'+id).value, sender: "管理者" };
            await fetch(GAS_URL, { method: "POST", body: JSON.stringify(data) });
            showToast("更新成功！");
            await fetchData(); renderAdmin();
        }

        window.onload = fetchData;
    </script>
</body>
</html>
